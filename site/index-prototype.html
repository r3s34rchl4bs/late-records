<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LATE RECORDS (PROTOTYPE)</title>
<link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/inter-latin.woff2">
<link rel="stylesheet" href="fonts/inter.css">
<link rel="stylesheet" href="style.css">
<style>
  /* 1. The Breather: Equal spacing for all major sections */
  .carousel-section, 
  .nav-section, 
  .catalog-table, 
  .rotator-section, 
  .solds-area, 
  .tag-cloud {
    margin-top: 5rem !important;
  }

  /* 2. Minimalist Table: Remove headers and top borders */
  .catalog-table thead {
    display: none;
  }
  .catalog-table {
    border-top: none !important;
  }
  .catalog-table table {
    border-collapse: collapse;
  }
  .catalog-table tr {
    border-bottom: 1px solid var(--border-subtle);
  }

  /* 3. Typography: Uniform weight for Artist and Title */
  .cell-artist, .cell-title {
    font-weight: 400 !important; /* Standard Inter weight */
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  /* 4. Navigation Styling */
  .nav-item[data-letter="root"] {
    font-family: monospace;
    letter-spacing: 0;
  }
</style>
</head>
<body>

<div id="app">
  <section class="carousel-section">
    <div id="carousel-container"></div>
  </section>

  <section class="nav-section">
    <div class="a-z-nav" id="azNav">
      <button class="nav-item active" data-letter="root">[&nbsp;&nbsp;]</button>
      <button class="nav-item" data-letter="A">A</button>
      <button class="nav-item" data-letter="B">B</button>
      <button class="nav-item" data-letter="C">C</button>
      <button class="nav-item" data-letter="D">D</button>
      <button class="nav-item" data-letter="E">E</button>
      <button class="nav-item" data-letter="F">F</button>
      <button class="nav-item" data-letter="G">G</button>
      <button class="nav-item" data-letter="H">H</button>
      <button class="nav-item" data-letter="I">I</button>
      <button class="nav-item" data-letter="J">J</button>
      <button class="nav-item" data-letter="K">K</button>
      <button class="nav-item" data-letter="L">L</button>
      <button class="nav-item" data-letter="M">M</button>
      <button class="nav-item" data-letter="N">N</button>
      <button class="nav-item" data-letter="O">O</button>
      <button class="nav-item" data-letter="P">P</button>
      <button class="nav-item" data-letter="Q">Q</button>
      <button class="nav-item" data-letter="R">R</button>
      <button class="nav-item" data-letter="S">S</button>
      <button class="nav-item" data-letter="T">T</button>
      <button class="nav-item" data-letter="U">U</button>
      <button class="nav-item" data-letter="V">V</button>
      <button class="nav-item" data-letter="W">W</button>
      <button class="nav-item" data-letter="X">X</button>
      <button class="nav-item" data-letter="Y">Y</button>
      <button class="nav-item" data-letter="Z">Z</button>
    </div>
  </section>

  <section class="catalog-table">
    <table id="catalogTable">
      <tbody id="catalogBody"></tbody>
    </table>
  </section>

  <section class="rotator-section">
    <div id="rotator-container"></div>
  </section>

  <section class="solds-area" id="soldLog" style="display:none"></section>

  <section class="tag-cloud" id="tagCloud"></section>
</div>

<script src="js/api.js"></script>
<script>
// ── DATA FILTERING LOGIC ────────────────────────────────────
function filterCatalog(catalog, criterion) {
  if (criterion === 'root') {
    // Show items marked 'idx' OR items starting with a number
    return catalog.filter(item => {
      const isIdx = item.Featured && item.Featured.toLowerCase() === 'idx';
      const startsWithNum = /^\d/.test(item.Title);
      return isIdx || startsWithNum;
    });
  }
  // Standard A-Z filtering
  return catalog.filter(item => item.Artist.toUpperCase().startsWith(criterion));
}

// ── TABLE RENDERER ──────────────────────────────────────────
function renderTable(data) {
  const body = document.getElementById('catalogBody');
  body.innerHTML = data.map(item => `
    <tr>
      <td class="cell-artist">${item.Artist}</td>
      <td class="cell-title">${item.Title}</td>
      <td class="cell-genre">${item.Genre}</td>
      <td class="cell-format">${item.Format}</td>
      <td class="cell-price">₱${item.Price}</td>
    </tr>
  `).join('');
}

// ── INITIALIZATION ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const catalog = await fetch('/api/catalog').then(res => res.json());
  
  // 1. Initial Load: Root View [ ]
  const initialData = filterCatalog(catalog, 'root');
  renderTable(initialData);

  // 2. Nav Click Handler
  document.getElementById('azNav').addEventListener('click', (e) => {
    if (e.target.classList.contains('nav-item')) {
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
      e.target.classList.add('active');
      
      const letter = e.target.getAttribute('data-letter');
      const filtered = filterCatalog(catalog, letter);
      renderTable(filtered);
    }
  });

  // 3. Carousel (Existing Logic - show if Featured is "yes")
  const carouselData = catalog.filter(item => item.Featured && item.Featured.toLowerCase() === 'yes');
  // ... call your existing buildCarousel(carouselData) function here ...
});
</script>
</body>
</html>

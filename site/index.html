<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="stylesheet" href="fonts/inter.css">
<script>document.documentElement.classList.toggle('dark', localStorage.getItem('lr_theme') === 'dark')</script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  --bg:         #e2e2e2;
  --bg-dot:     rgba(0,0,0,.08);
  --ink:        #1a1a14;
  --ink55:      rgba(26,26,20,.55);
  --ink45:      rgba(26,26,20,.45);
  --ink30:      rgba(26,26,20,.30);
  --ink15:      rgba(26,26,20,.15);
  --border:     rgba(26,26,20,.22);
  --border-mid: rgba(26,26,20,.12);
  --border-tag: rgba(26,26,20,.24);
  --art-bg:     rgba(26,26,20,.07);
  --btn-bg:     #1a1a14;
  --btn-fg:     #e2e2e2;
}

html.dark {
  --bg:         #141410;
  --bg-dot:     rgba(255,255,255,.04);
  --ink:        #e8e8df;
  --ink55:      rgba(232,232,223,.55);
  --ink45:      rgba(232,232,223,.42);
  --ink30:      rgba(232,232,223,.26);
  --ink15:      rgba(232,232,223,.12);
  --border:     rgba(232,232,223,.18);
  --border-mid: rgba(232,232,223,.1);
  --border-tag: rgba(232,232,223,.2);
  --art-bg:     rgba(232,232,223,.06);
  --btn-bg:     #e8e8df;
  --btn-fg:     #141410;
}

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  pointer-events: none; z-index: -1;
}

img { display: block; max-width: 100%; }
a   { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
html.no-transitions * { transition: none !important; }

/* ── Header ──────────────────────────────────────────────── */
.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  z-index: 1000; border-bottom: 1px solid var(--border); height: 74px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.header-right { display: flex; align-items: center; gap: 16px; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink);
}
.cart-link:hover { color: var(--ink55); }

/* ── Header icon buttons (search + theme) ────────────────── */
.header-icon-btn {
  background: none; border: none; padding: 4px; color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0; cursor: pointer;
}
.header-icon-btn:hover { opacity: .6; }
.header-icon-btn svg { width: 18px; height: 18px; display: block; }
html:not(.dark) .header-icon-btn .icon-moon { display: none; }
html.dark        .header-icon-btn .icon-sun  { display: none; }
.logo-dark            { display: none; }
html.dark .logo-light { display: none; }
html.dark .logo-dark  { display: block; }

/* ── Search overlay ──────────────────────────────────────── */
.search-overlay {
  position: fixed; top: 74px; left: 0; width: 100%;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  border-bottom: 1px solid var(--border);
  z-index: 998;
  opacity: 0; transform: translateY(-6px);
  pointer-events: none;
  transition: opacity .15s ease, transform .15s ease;
  max-height: calc(100vh - 74px); overflow-y: auto;
}
.search-overlay.open {
  opacity: 1; transform: translateY(0); pointer-events: all;
}
.search-overlay-bar {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; height: 52px;
  border-bottom: 1px solid var(--border-mid);
}
.search-overlay-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px; font-weight: 400; color: var(--ink);
  padding: 0; outline: none; letter-spacing: .01em;
}
.search-overlay-input::placeholder { color: var(--ink30); }
.search-overlay-close {
  background: none; border: none; padding: 4px 0 4px 12px;
  font-size: 14px; color: var(--ink30); line-height: 1;
  transition: color .1s;
}
.search-overlay-close:hover { color: var(--ink); }
.search-results-list {
  max-width: 1200px; margin: 0 auto; padding: 6px 30px 16px;
}
.search-result-item {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 0; border-bottom: 1px solid var(--border-mid);
  text-decoration: none; color: inherit; cursor: pointer;
  transition: opacity .1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { opacity: .6; }
.search-result-art {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--art-bg); overflow: hidden;
}
.search-result-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.search-result-text { flex: 1; min-width: 0; }
.search-result-title {
  font-size: 14px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-artist {
  font-size: 11px; color: var(--ink45); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-meta {
  flex-shrink: 0; font-size: 10px; color: var(--ink30);
  letter-spacing: .07em; text-transform: uppercase;
}
.search-empty {
  padding: 20px 0; font-size: 13px; color: var(--ink30); letter-spacing: .01em;
}

/* ── Container ───────────────────────────────────────────── */
.container {
  max-width: 1200px; margin: 0 auto; padding: 84px 30px 80px;
}

/* ── Carousel ────────────────────────────────────────────── */
.carousel-section { margin-bottom: 0; }
.section-divider  { border: none; margin: 3px 0; }
.carousel-viewport {
  height: 235px; overflow: hidden; position: relative;
  border-bottom: 1px solid var(--border);
}
.carousel-track { display: flex; height: 100%; }
.carousel-card {
  min-width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; cursor: pointer;
}
.card-inner {
  width: 100%; padding: 22px 0 18px; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
}
.carousel-nav {
  position: absolute; top: 0; right: 0;
  display: flex; align-items: center; gap: 5px; z-index: 10;
}
.carousel-btn {
  width: 34px; height: 34px; border: 1px solid var(--ink30);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--ink); transition: color 0.1s linear;
}
.carousel-btn:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
.card-top { flex: 1; min-height: 0; padding-right: 110px; }
.card-staff-pick {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink30); margin-bottom: 14px;
}
.card-artist {
  font-size: 13px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink45); margin-bottom: 8px;
}
.card-title {
  font-size: 42px; font-weight: 500; line-height: 1.05;
  letter-spacing: -.035em; margin-bottom: 12px; word-break: break-word;
  color: var(--ink); transition: color 0.1s linear;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-format {
  font-size: 11px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink45);
}
.card-meta-divider { width: 1px; height: 10px; background: var(--ink30); flex-shrink: 0; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.card-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: 1px solid var(--border-tag);
  padding: 3px 8px; color: var(--ink45); cursor: pointer; transition: color 0.1s linear;
}
.card-tag:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
.card-bottom { display: none; }
.carousel-card:hover .card-artist,
.carousel-card:hover .card-title { color: var(--ink); }

/* ── A–Z Bar ─────────────────────────────────────────────── */
.az-bar {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.az-bar::-webkit-scrollbar { display: none; }

/* "All" stays pinned on the left */
.az-btn-all {
  position: sticky; left: 0; z-index: 2;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  border: none; border-right: 1px solid var(--border-mid);
  padding: 8px 14px; flex-shrink: 0;
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink45);
  cursor: pointer; transition: color .1s;
}
.az-btn-all.active { color: var(--ink); }
.az-btn-all:hover  { color: var(--ink); }

.az-letters {
  display: flex; flex: 1;
}
.az-btn {
  flex-shrink: 0; background: none; border: none;
  padding: 8px 8px; min-width: 28px;
  font-size: 10px; font-weight: 500; letter-spacing: .05em;
  text-transform: uppercase; color: var(--ink30);
  cursor: pointer; line-height: 1; text-align: center;
  position: relative; transition: color .1s;
}
.az-btn::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px; background: var(--ink);
  transition: width .15s ease;
}
.az-btn:hover { color: var(--ink); }
.az-btn.active { color: var(--ink); }
.az-btn.active::after { width: 60%; }

/* ── Table ───────────────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.c-art    { width: 52px; }
col.c-title  { width: auto; }
col.c-genre  { width: 14%; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  position: sticky; top: 74px; z-index: 30;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  box-shadow: 0 -1px 0 var(--border), 0 1px 0 rgba(26,26,20,.26);
  padding: 10px 12px 10px 0; font-size: 11px; font-weight: 500;
  letter-spacing: .09em; text-transform: uppercase; color: var(--ink55);
  text-align: left; vertical-align: middle;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }
.tbl thead th.c-art   { padding-right: 0; }

/* Availability toggle in art header */
.avail-toggle {
  width: 14px; height: 14px; border: 1.5px solid var(--ink30);
  background: transparent; cursor: pointer; flex-shrink: 0;
  padding: 0; display: block;
  transition: background .12s, border-color .12s;
}
.avail-toggle.active { background: var(--btn-bg); border-color: var(--btn-bg); }

.tbl tbody tr { cursor: pointer; transition: color 0.1s linear; }
.tbl tbody tr:hover .rec-title, .tbl tbody tr:hover .rec-artist,
.tbl tbody tr:hover .rec-stock { color: var(--ink); }
.tbl tbody td {
  padding: 10px 12px 10px 0; border-bottom: 1px solid var(--border-mid); vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-right: 0; }
.tbl thead th.c-stock { padding-bottom: 10px; padding-right: 0; }
.tbl tbody td.c-art   { padding-right: 10px; }

.rec-art-wrap {
  width: 38px; height: 38px; overflow: hidden;
  flex-shrink: 0; background: var(--art-bg);
}
.rec-art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tbl tbody tr.sold .rec-art-wrap { opacity: .35; }

.rec-title {
  font-size: 15px; font-weight: 500; line-height: 1.25; letter-spacing: -.01em;
  transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rec-artist {
  font-size: 12px; font-weight: 400; color: var(--ink55);
  margin-top: 3px; line-height: 1.4; transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.genre-tag {
  display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink55); border: 1px solid var(--ink30);
  padding: 3px 7px; line-height: 1.4; white-space: nowrap; cursor: pointer;
  transition: color 0.1s linear, border-color 0.1s linear;
}
.genre-tag:hover { color: var(--ink); border-color: var(--ink); }
.rec-format { font-size: 11px; font-weight: 400; letter-spacing: .05em; text-transform: uppercase; color: var(--ink55); }
.rec-stock {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: var(--ink); }
.sdot.s { background: var(--ink30); }

.tbl tbody tr.sold .rec-title  { color: var(--ink55); }
.tbl tbody tr.sold .rec-artist { color: var(--ink30); }
.tbl tbody tr.sold .genre-tag  { color: var(--ink30); border-color: var(--ink15); }
.tbl tbody tr.sold .rec-format { color: var(--ink30); }
.tbl tbody tr.sold .rec-stock  { color: var(--ink30); }
.tbl tbody tr.sold .sdot       { background: var(--ink30) !important; }

/* ── Skeleton ────────────────────────────────────────────── */
.sk {
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite;
}
html.dark .sk {
  background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.05) 75%);
  background-size: 200% 100%;
}
@keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-art    { width: 44px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  col.c-genre { width: auto; }
  .tbl thead th.c-genre { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-genre { text-align: right; padding-right: 0; }
  .carousel-viewport { height: 235px; }
  .card-title  { font-size: 32px; }
  .card-artist { font-size: 11px; }
  .rec-title   { font-size: 14px; }
  .rec-artist  { font-size: 11px; }
  .rec-art-wrap { width: 32px; height: 32px; }
}

@media (max-width: 600px) {
  .container    { padding: 84px 20px 80px; }
  .header-inner { padding: 0 20px; }
  .card-inner   { padding: 10px 0 4px; }
  .carousel-nav { right: 0; top: 0; }
  .carousel-viewport { height: 155px; }
  .card-top     { padding-right: 90px; }
  .card-staff-pick { font-size: 8px; margin-bottom: 10px; }
  .card-artist     {
    font-size: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 8px;
  }
  .card-title      {
    font-size: 20px; letter-spacing: -.02em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 6px;
  }
  .card-format     { font-size: 9px; }
  .card-tag        { font-size: 9px; padding: 2px 6px; }
  .card-meta       { gap: 6px; }
  .card-tags       { gap: 4px; }
  .carousel-btn    { height: 30px; }
  .tbl thead th { top: 74px; font-size: 10px; }
  .rec-title    { font-size: 13px; }
  .rec-artist   {
    font-size: 11px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .genre-tag    { font-size: 9px; padding: 2px 5px; }
  col.c-art    { width: 38px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  .rec-art-wrap { width: 28px; height: 28px; }
  .tbl tbody td.c-art { padding-right: 6px; }
  .search-overlay-bar  { padding: 0 20px; }
  .search-results-list { padding: 6px 20px 16px; }
}

</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo logo-light" alt="LATE RECORDS">
      <img src="images/late-records-logo-dark.png" class="header-logo logo-dark" alt="LATE RECORDS">
    </a>
    <div class="header-right">
      <!-- Search -->
      <button class="header-icon-btn" id="searchToggle" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </button>
      <!-- Theme toggle -->
      <button class="header-icon-btn" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93"  y1="4.93"  x2="7.05" y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95"/>
          <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<!-- Search overlay (fixed, slides in below header) -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-bar">
    <input class="search-overlay-input" id="searchInput" type="search"
      autocomplete="off" spellcheck="false" placeholder="Search by title, artist, genre…">
    <button class="search-overlay-close" id="searchClose">&#215;</button>
  </div>
  <div class="search-results-list" id="searchResultsList"></div>
</div>

<div class="container">

  <section class="carousel-section">
    <div class="carousel-viewport">
      <div class="carousel-track" id="carouselTrack">
        <div class="carousel-card" style="cursor:default">
          <div class="card-inner">
            <div class="card-top">
              <div class="sk" style="width:8%;margin-bottom:14px"></div>
              <div class="sk" style="width:14%;margin-bottom:10px"></div>
              <div class="sk" style="width:40%;height:18px;margin-bottom:18px"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="carousel-nav" id="carouselNav">
        <button class="carousel-btn" id="prevBtn">&#8249;</button>
        <button class="carousel-btn" id="nextBtn">&#8250;</button>
      </div>
    </div>
  </section>

  <hr class="section-divider">

  <!-- A–Z filter bar -->
  <nav class="az-bar" id="azBar">
    <button class="az-btn-all active" data-letter="ALL" onclick="setAZFilter('ALL')">All</button>
    <div class="az-letters">
      <button class="az-btn" data-letter="0-9" onclick="setAZFilter('0-9')">0–9</button>
      <button class="az-btn" data-letter="A" onclick="setAZFilter('A')">A</button>
      <button class="az-btn" data-letter="B" onclick="setAZFilter('B')">B</button>
      <button class="az-btn" data-letter="C" onclick="setAZFilter('C')">C</button>
      <button class="az-btn" data-letter="D" onclick="setAZFilter('D')">D</button>
      <button class="az-btn" data-letter="E" onclick="setAZFilter('E')">E</button>
      <button class="az-btn" data-letter="F" onclick="setAZFilter('F')">F</button>
      <button class="az-btn" data-letter="G" onclick="setAZFilter('G')">G</button>
      <button class="az-btn" data-letter="H" onclick="setAZFilter('H')">H</button>
      <button class="az-btn" data-letter="I" onclick="setAZFilter('I')">I</button>
      <button class="az-btn" data-letter="J" onclick="setAZFilter('J')">J</button>
      <button class="az-btn" data-letter="K" onclick="setAZFilter('K')">K</button>
      <button class="az-btn" data-letter="L" onclick="setAZFilter('L')">L</button>
      <button class="az-btn" data-letter="M" onclick="setAZFilter('M')">M</button>
      <button class="az-btn" data-letter="N" onclick="setAZFilter('N')">N</button>
      <button class="az-btn" data-letter="O" onclick="setAZFilter('O')">O</button>
      <button class="az-btn" data-letter="P" onclick="setAZFilter('P')">P</button>
      <button class="az-btn" data-letter="Q" onclick="setAZFilter('Q')">Q</button>
      <button class="az-btn" data-letter="R" onclick="setAZFilter('R')">R</button>
      <button class="az-btn" data-letter="S" onclick="setAZFilter('S')">S</button>
      <button class="az-btn" data-letter="T" onclick="setAZFilter('T')">T</button>
      <button class="az-btn" data-letter="U" onclick="setAZFilter('U')">U</button>
      <button class="az-btn" data-letter="V" onclick="setAZFilter('V')">V</button>
      <button class="az-btn" data-letter="W" onclick="setAZFilter('W')">W</button>
      <button class="az-btn" data-letter="X" onclick="setAZFilter('X')">X</button>
      <button class="az-btn" data-letter="Y" onclick="setAZFilter('Y')">Y</button>
      <button class="az-btn" data-letter="Z" onclick="setAZFilter('Z')">Z</button>
    </div>
  </nav>

  <table class="tbl" id="catalogTable">
    <colgroup>
      <col class="c-art"><col class="c-title"><col class="c-genre"><col class="c-format"><col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-art">
          <button class="avail-toggle active" id="availToggle" aria-label="Toggle available only" onclick="toggleAvail()"></button>
        </th>
        <th class="c-title">Title / Artist</th>
        <th class="c-genre">Genre</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="catalogList">
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:55%;margin-bottom:8px"></div><br><div class="sk" style="width:30%"></div></td><td class="c-genre"><div class="sk" style="width:70%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:68%;margin-bottom:8px"></div><br><div class="sk" style="width:38%"></div></td><td class="c-genre"><div class="sk" style="width:60%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:44%;margin-bottom:8px"></div><br><div class="sk" style="width:24%"></div></td><td class="c-genre"><div class="sk" style="width:78%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:60%;margin-bottom:8px"></div><br><div class="sk" style="width:34%"></div></td><td class="c-genre"><div class="sk" style="width:63%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:50%;margin-bottom:8px"></div><br><div class="sk" style="width:28%"></div></td><td class="c-genre"><div class="sk" style="width:72%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
    </tbody>
  </table>

</div>

<script src="script.js"></script>
<script src="catalog.js"></script>
<script src="search.js"></script>
<script>

function _escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Carousel ────────────────────────────────────────────── */
function buildCarousel(albums) {
  const featured = albums.filter(a => String(a.featured).toLowerCase() === 'yes').slice(0, 5);
  const cards = featured.length >= 1 ? featured : albums.slice(0, 5);
  const track = document.getElementById('carouselTrack');
  let current = 0;
  track.innerHTML = '';
  cards.forEach((album) => {
    const tags     = LR.ui.splitPipe(album.genre).slice(0, 2);
    const albumUrl = `albums/album.html?id=${encodeURIComponent(album.album_id)}`;
    const card     = document.createElement('div');
    card.className = 'carousel-card';
    card.addEventListener('click', () => location.href = albumUrl);
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-top">
          <div class="card-staff-pick">Staff Pick</div>
          <div class="card-artist">${_escHTML(album.artist)}</div>
          <div class="card-title">${_escHTML(album.title)}</div>
          <div class="card-meta">
            <span class="card-format">${_escHTML(album.format || 'LP')}</span>
            <span class="card-meta-divider"></span>
            <div class="card-tags">${tags.map(t =>
              `<span class="card-tag" onclick="event.stopPropagation();location.href='genre.html?g=${encodeURIComponent(t.toLowerCase())}'">${_escHTML(t)}</span>`
            ).join('')}</div>
          </div>
        </div>
      </div>`;
    track.appendChild(card);
  });
  const viewport = document.querySelector('.carousel-viewport');
  const progressContainer = document.createElement('div');
  progressContainer.style.cssText = 'display:flex;gap:3px;margin-top:10px;';
  viewport.parentNode.insertBefore(progressContainer, viewport.nextSibling);
  const bars = [];
  cards.forEach((_, i) => {
    const b = document.createElement('div');
    b.style.cssText = 'flex:1;height:2px;background:var(--ink15);transition:height .2s ease,background .2s ease;';
    progressContainer.appendChild(b);
    bars.push(b);
  });
  function goTo(index) {
    if (index < 0) index = cards.length - 1;
    if (index >= cards.length) index = 0;
    current = index;
    track.style.transform = `translateX(-${current * 100}%)`;
    bars.forEach((b, i) => {
      b.style.height = i === current ? '4px' : '2px';
      b.style.background = i === current ? 'var(--ink)' : 'var(--ink15)';
    });
  }
  goTo(0);
  document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current - 1); });
  document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current + 1); });
}

/* ── A–Z Filter ──────────────────────────────────────────── */
window._azFilter = 'ALL';

function setAZFilter(letter) {
  window._azFilter = letter;
  // Update All button
  document.querySelector('.az-btn-all').classList.toggle('active', letter === 'ALL');
  // Update letter buttons
  document.querySelectorAll('.az-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.letter === letter);
  });
  const catalog = window._catalogCache;
  if (!catalog) return;
  let filtered = catalog;
  if (letter !== 'ALL') {
    if (letter === '0-9') filtered = catalog.filter(a => /^[0-9]/.test(a.artist.trim()));
    else filtered = catalog.filter(a => a.artist.trim().toUpperCase().startsWith(letter));
  }
  buildTable(filtered);
}

/* ── Availability toggle (default ON = available only) ────── */
window.availFilterActive = true;

function toggleAvail() {
  window.availFilterActive = !window.availFilterActive;
  document.getElementById('availToggle').classList.toggle('active', window.availFilterActive);
  applyAvailToggle();
}

/* ── Header search overlay ───────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const toggle  = document.getElementById('searchToggle');
  const overlay = document.getElementById('searchOverlay');
  const input   = document.getElementById('searchInput');
  const close   = document.getElementById('searchClose');
  const results = document.getElementById('searchResultsList');

  function openSearch() {
    overlay.classList.add('open');
    setTimeout(() => input.focus(), 50);
  }
  function closeSearch() {
    overlay.classList.remove('open');
    input.value = '';
    results.innerHTML = '';
  }

  toggle.addEventListener('click', () => {
    overlay.classList.contains('open') ? closeSearch() : openSearch();
  });
  close.addEventListener('click', closeSearch);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSearch();
  });
  document.addEventListener('click', e => {
    if (overlay.classList.contains('open') &&
        !overlay.contains(e.target) &&
        !toggle.contains(e.target)) {
      closeSearch();
    }
  });

  let _searchDebounce = null;
  input.addEventListener('input', () => {
    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(() => runSearch(input.value), 120);
  });

  function runSearch(raw) {
    const q = raw.trim().toLowerCase();
    if (!q || !window._catalogCache) { results.innerHTML = ''; return; }

    const hits = window._catalogCache
      .filter(a => {
        return a.artist.toLowerCase().includes(q) ||
               a.title.toLowerCase().includes(q)  ||
               (a.genre  || '').toLowerCase().includes(q) ||
               (a.format || '').toLowerCase().includes(q);
      })
      .slice(0, 8);

    if (!hits.length) {
      results.innerHTML = `<div class="search-empty">No results for "${_escHTML(raw.trim())}"</div>`;
      return;
    }

    results.innerHTML = hits.map(a => {
      const url   = `albums/album.html?id=${encodeURIComponent(a.album_id)}`;
      const avail = a.status === 'available';
      return `<a class="search-result-item" href="${url}">
        <div class="search-result-art">
          <img src="images/${encodeURIComponent(a.album_id)}.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="search-result-text">
          <div class="search-result-title">${_escHTML(a.title)}</div>
          <div class="search-result-artist">${_escHTML(a.artist)}</div>
        </div>
        <div class="search-result-meta">${_escHTML(a.format || 'LP')}${avail ? '' : ' · Sold'}</div>
      </a>`;
    }).join('');
  }
});

/* ── Boot ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {

  async function loadCatalog(retries) {
    for (let i = 0; i <= retries; i++) {
      try { return await LR.api.catalog(); }
      catch(e) { if (i < retries) await new Promise(r => setTimeout(r, 1000 * (i + 1))); }
    }
    return null;
  }

  const catalog = await loadCatalog(2);
  if (catalog) {
    window._catalogCache = catalog;
    buildCarousel(catalog);
    // Build table with availability ON by default
    buildTable(catalog);
    applyAvailToggle();
  } else {
    document.getElementById('carouselTrack').innerHTML = '';
    document.getElementById('catalogList').innerHTML =
      `<tr><td colspan="5" style="padding:40px 0;font-size:13px;color:var(--ink55)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

</script>

</body>

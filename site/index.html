<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="stylesheet" href="fonts/inter.css">
<script>document.documentElement.classList.toggle('dark', localStorage.getItem('lr_theme') === 'dark')</script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  --bg:         #e2e2e2;
  --bg-dot:     rgba(0,0,0,.08);
  --ink:        #1a1a14;
  --ink55:      rgba(26,26,20,.55);
  --ink45:      rgba(26,26,20,.45);
  --ink30:      rgba(26,26,20,.30);
  --ink15:      rgba(26,26,20,.15);
  --border:     rgba(26,26,20,.22);
  --border-mid: rgba(26,26,20,.12);
  --border-tag: rgba(26,26,20,.24);
  --art-bg:     rgba(26,26,20,.07);
  --btn-bg:     #1a1a14;
  --btn-fg:     #e2e2e2;
}

html.dark {
  --bg:         #141410;
  --bg-dot:     rgba(255,255,255,.04);
  --ink:        #e8e8df;
  --ink55:      rgba(232,232,223,.55);
  --ink45:      rgba(232,232,223,.42);
  --ink30:      rgba(232,232,223,.26);
  --ink15:      rgba(232,232,223,.12);
  --border:     rgba(232,232,223,.18);
  --border-mid: rgba(232,232,223,.1);
  --border-tag: rgba(232,232,223,.2);
  --art-bg:     rgba(232,232,223,.06);
  --btn-bg:     #e8e8df;
  --btn-fg:     #141410;
}

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; min-height: 100vh; }
.container { flex: 1; max-width: 890px; margin: 0 auto; padding: 84px 30px 0; width: 100%; }
.bottom-section { width: 100%; max-width: 890px; margin: 0 auto; padding: 0 30px 32px; }


img { display: block; max-width: 100%; }
a   { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  z-index: 1000;
  border-bottom: 1px solid var(--border);
  height: 74px;
}
.header-inner {
  max-width: 890px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 31px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.logo-dark            { display: none; }
html.dark .logo-light { display: none; }
html.dark .logo-dark  { display: block; }
.header-right { display: flex; align-items: center; gap: 16px; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink); text-decoration: none;
}
.cart-link:hover { color: var(--ink55); }

/* ── Search icon + drop-down bar ──────────────────────────── */
.search-btn {
  background: none; border: none; padding: 4px;
  color: var(--ink); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.search-btn:hover { opacity: .6; }
.search-btn svg { width: 17px; height: 17px; }

.search-bar {
  position: fixed;
  top: 74px; left: 0; right: 0;
  z-index: 998;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  border-bottom: 1px solid var(--border);
  height: 0; overflow: hidden;
  transition: height .18s ease;
}
.search-bar.open { height: 46px; }

.search-bar-inner {
  max-width: 890px; margin: 0 auto; padding: 0 30px;
  height: 46px; display: flex; align-items: center;
}
.search-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px; font-weight: 400; color: var(--ink);
  padding: 5px 0; outline: none; letter-spacing: .01em;
}
.search-input::placeholder { color: var(--ink30); }
.search-clear {
  border: none; background: none; padding: 0 0 0 8px;
  font-size: 16px; color: var(--ink30); cursor: pointer;
  line-height: 1; display: none; transition: color .1s;
}
.search-clear:hover { color: var(--ink); }
.search-count {
  font-size: 10px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink30);
  padding-left: 14px; white-space: nowrap; flex-shrink: 0;
}
@media (max-width: 600px) {
  .search-bar-inner { padding: 0 20px; }
  .search-count { display: none; }
}

body.search-open .tbl thead th { top: 120px; }
body.search-open .suggestions-header { padding-top: 56px; }
body.search-open .no-results-empty { padding-top: 134px; }

/* ── Theme toggle ──────────────────────────────────────────── */
.theme-toggle {
  background: none; border: none; padding: 4px;
  color: var(--ink); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.theme-toggle:hover { opacity: .6; }
.theme-toggle .icon-sun,
.theme-toggle .icon-moon { width: 18px; height: 18px; display: block; }
html:not(.dark) .theme-toggle .icon-moon { display: none; }
html.dark        .theme-toggle .icon-sun  { display: none; }



/* ── Hide carousel + nav + rotator + tag cloud when searching ── */
body.search-active .carousel-section,
body.search-active .section-divider,
body.search-active .az-nav,
body.search-active .info-rotator,
body.search-active .tag-cloud { display: none; }

/* ── Info rotator (are.na style) ─────────────────────────── */
.info-rotator {
  display: flex; align-items: center; justify-content: center;
  padding: 14px 0;
  margin: 32px auto 32px;
  gap: 12px;
  max-width: 520px;
}
.info-rotator-btn {
  width: 28px; height: 28px; flex-shrink: 0;
  border: 1px solid transparent; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--ink45); transition: color 0.1s, border-color 0.1s;
}
.info-rotator-btn:active { border-color: var(--ink30); color: var(--ink); }
.info-rotator-content {
  flex: 1; min-width: 0; text-align: center;
}
.info-rotator-title {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink45); margin-bottom: 4px;
}
.info-rotator-text {
  font-size: 11px; font-weight: 200; color: var(--ink30);
  letter-spacing: .01em; line-height: 1.5;
}

/* ── Carousel ────────────────────────────────────────────── */
.carousel-section { margin-bottom: 0; }

.section-divider {
  border: none;
  margin: 3px 0;
}

.carousel-viewport {
  height: 235px; overflow: hidden; position: relative;
  border-bottom: 1px solid var(--border);
}
.carousel-track {
  display: flex; height: 100%;
}

.carousel-card {
  min-width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; cursor: pointer;
}

.card-inner {
  width: 100%; padding: 22px 0 18px; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
}

.carousel-nav {
  position: absolute; top: 0; right: 0;
  display: flex; align-items: center; gap: 5px; z-index: 10;
}
.carousel-btn {
  width: 34px; height: 34px;
  border: 1px solid var(--ink30); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--ink); transition: color 0.1s linear;
}
.carousel-btn:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }

.card-top { flex: 1; min-height: 0; padding-right: 110px; }

.card-staff-pick {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink30); margin-bottom: 14px;
}
.card-artist {
  font-size: 13px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink45); margin-bottom: 8px;
}
.card-title {
  font-size: 42px; font-weight: 500; line-height: 1.05;
  letter-spacing: -.035em; margin-bottom: 12px; word-break: break-word;
  color: var(--ink); transition: color 0.1s linear;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  display: flex; 
  align-items: center; 
  gap: 6px; 
  flex-wrap: wrap; /* Allows wrapping to the next line */
}

/* Add this new rule below .card-meta */
.card-tags { 
  display: flex; 
  gap: 4px; 
  flex-wrap: wrap; 
  align-items: center; 
  width: 100%; /* Forces the next elements to drop down */
  margin-bottom: 6px; /* Adds space between the tag row and format row */
}
.card-format {
  font-size: 11px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink45);
}
.card-meta-divider {
  width: 1px; height: 10px; background: var(--ink30); flex-shrink: 0;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.card-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: 1px solid var(--border-tag);
  padding: 3px 8px; color: var(--ink45);
  cursor: pointer; transition: color 0.1s linear;
}
.card-tag:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }

.card-bottom { display: none; }

.carousel-card:hover .card-artist,
.carousel-card:hover .card-title { color: var(--ink); }

/*
 * ── Table layout ────────────────────────────────────────────
 *
 * IMPORTANT: col.c-art width must ALWAYS match .rec-art-wrap width.
 * The art column is sized to exactly fit the album cover with zero
 * right padding, so the column edge = album art edge.
 * The gap between art and title is handled by padding-left on c-title,
 * NOT by padding-right on c-art. This keeps the art column tight.
 *
 * Column sizes at each breakpoint:
 *   Desktop:  col.c-art = 38px,  .rec-art-wrap = 38px
 *   ≤900px:   col.c-art = 32px,  .rec-art-wrap = 32px
 *   ≤600px:   col.c-art = 28px,  .rec-art-wrap = 28px
 *
 * All header text and the vinyl icon use vertical-align: middle
 * so they sit centered in the header row.
 */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.c-art    { width: 38px; }
col.c-title  { width: auto; }
col.c-genre  { width: 14%; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

/* ── Header row (sticky) ──────────────────────────────────── */
.tbl thead th {
  position: sticky;
  top: 74px;
  z-index: 30;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  box-shadow: 0 -1px 0 var(--border), 0 1px 0 rgba(26,26,20,.26);
  padding: 10px 12px 10px 0; font-size: 11px; font-weight: 500;
  letter-spacing: .09em; text-transform: uppercase; color: var(--ink55);
  text-align: left; vertical-align: middle;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-art   { padding-right: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }

.tbl thead th.c-title, .tbl tbody td.c-title { padding-left: 10px; }

.art-icon { width: 20px; height: 20px; opacity: .4; display: block; margin: 0 auto; }

/* ── Data rows ────────────────────────────────────────────── */
.tbl tbody tr, .tbl tbody td { background: transparent; }
.tbl tbody tr { cursor: pointer; transition: color 0.1s linear; }
.tbl tbody tr:hover .rec-title, .tbl tbody tr:hover .rec-artist,
.tbl tbody tr:hover .rec-stock { color: var(--ink); }
.tbl tbody td {
  padding: 10px 12px 10px 0; border-bottom: 1px solid var(--border-mid); vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-art   { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-right: 0; }
.tbl thead th.c-stock { padding-bottom: 10px; padding-right: 0; }
.tbl tbody tr:first-child td { border-top: 1px solid var(--border-mid); }

/* ── Album art ───────────────────────────────────────────── */
.rec-art-wrap {
  width: 38px; height: 38px;
  overflow: hidden; flex-shrink: 0;
  background: var(--art-bg);
}
.rec-art-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.tbl tbody tr.sold .rec-art-wrap { opacity: .35; }

/* ── Row text ────────────────────────────────────────────── */
.rec-title {
  font-size: 15px; font-weight: 500; line-height: 1.25; letter-spacing: -.01em;
  transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rec-artist {
  font-size: 12px; font-weight: 400; color: var(--ink55);
  margin-top: 3px; line-height: 1.4; transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.genre-tag {
  display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink55); border: 1px solid var(--ink30);
  padding: 3px 7px; line-height: 1.4; white-space: nowrap; cursor: pointer;
  transition: color 0.1s linear, border-color 0.1s linear;
}
.genre-tag:hover { color: var(--ink); border-color: var(--ink); }

.rec-format { font-size: 11px; font-weight: 400; letter-spacing: .05em; text-transform: uppercase; color: var(--ink55); }

.rec-stock {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: var(--ink); }
.sdot.s { background: var(--ink30); }

.tbl tbody tr.sold .rec-title  { color: var(--ink55); }
.tbl tbody tr.sold .rec-artist { color: var(--ink30); }
.tbl tbody tr.sold .genre-tag  { color: var(--ink30); border-color: var(--ink15); }
.tbl tbody tr.sold .rec-format { color: var(--ink30); }
.tbl tbody tr.sold .rec-stock  { color: var(--ink30); }
.tbl tbody tr.sold .sdot       { background: var(--ink30) !important; }

/* ── A-Z Nav ─────────────────────────────────────────────── */
.az-nav {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 8px 6px; padding: 24px 0 22px;
  border-bottom: 1px solid var(--border-mid);
}
.az-letter {
  font-size: 12px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: none; background: none;
  color: var(--ink45); cursor: pointer;
  padding: 7px 13px; min-width: 34px; text-align: center;
  line-height: 1; transition: color .1s, background .1s;
}
.az-letter:hover:not(:disabled) { color: var(--ink); background: var(--border-mid); }
.az-letter.active { background: var(--btn-bg); color: var(--btn-fg); }
.az-letter.empty, .az-letter:disabled { color: var(--ink15); cursor: default; }

/* ── Search ──────────────────────────────────────────────── */
.search-row {
  display: flex; align-items: center;
  border-top: none; border-bottom: none;
  margin: 10px 0;
}
.suggestions-header {
  display: none;
  padding: 28px 0 16px;
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink45);
}
.suggestions-header span { color: var(--ink); }
.suggestions-header.is-loading::after {
  content: ''; animation: ellipsis 1.2s steps(4, end) infinite;
}
@keyframes ellipsis {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
}
.no-results-empty {
  padding: 40px 0;
  font-size: 13px; color: var(--ink30); letter-spacing: .01em;
  display: none;
  position: relative; z-index: 1;
}
.rec-title mark, .rec-artist mark {
  background: var(--border-mid); color: var(--ink); padding: 0 1px; border-radius: 1px;
}
.tbl tbody tr.is-suggestion td:nth-child(2) { padding-left: 10px; }
@media (max-width: 600px) { .search-count { display: none; } }

/* ── Availability toggle ─────────────────────────────────── */
.avail-toggle {
  display: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--ink30);
  background: transparent;
  cursor: pointer; flex-shrink: 0;
  margin-left: 12px; padding: 0;
  transition: background .12s, border-color .12s;
}
.avail-toggle.active {
  background: var(--btn-bg);
  border-color: var(--btn-bg);
}

.sk {
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite;
}
html.dark .sk {
  background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.05) 75%);
  background-size: 200% 100%;
}
@keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-art    { width: 32px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  col.c-genre { width: auto; }
  .tbl thead th.c-genre { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-genre { text-align: right; padding-right: 0; }
  .carousel-viewport { height: 235px; }
  .card-title  { font-size: 32px; }
  .card-artist { font-size: 11px; }
  .rec-title   { font-size: 14px; }
  .rec-artist  { font-size: 11px; }
  .rec-art-wrap { width: 32px; height: 32px; }
}

@media (max-width: 600px) {
  .container    { padding: 94px 20px 0; }
  .bottom-section { padding: 0 20px 28px; }
  .header-inner { padding: 0 20px; }
  .card-inner   { padding: 10px 0 4px; }
  .carousel-nav { right: 0; top: 0; }
  .carousel-viewport { height: 155px; }
  .card-top     { padding-right: 90px; }
  .card-staff-pick { font-size: 8px; margin-bottom: 10px; }
  .card-artist     {
    font-size: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 8px;
  }
  .card-title      {
    font-size: 20px; letter-spacing: -.02em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 6px;
  }
  .card-format     { font-size: 9px; }
  .card-tag        { font-size: 9px; padding: 2px 6px; }
  .card-meta       { gap: 6px; }
  .card-tags       { gap: 4px; }
  .carousel-btn    { height: 24px; width: 28px; font-size: 16px; }
  .tbl thead th { top: 74px; font-size: 10px; }
  .rec-title    { font-size: 13px; }
  .rec-artist   {
    font-size: 11px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .genre-tag    { font-size: 9px; padding: 2px 5px; }
  .az-nav       { justify-content: space-between; }
  col.c-art    { width: 28px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  .rec-art-wrap { width: 28px; height: 28px; }
}

/* ── Album art rotator (marquee) — hidden for now ───────── */
.art-rotator { display: none; }

/* ── Tag cloud (YouTube 2005 style) ─────────────────────── */
.tag-cloud {
  padding: 24px 0 48px;
  border-top: 1px solid var(--border-mid);
  text-align: left;
  line-height: 1.7;
}
.tag-cloud-list { display: block; }
.tag-cloud-item {
  font-size: 11px; color: var(--ink45);
  cursor: pointer; text-decoration: none;
  transition: color .1s;
}
.tag-cloud-item:visited, .tag-cloud-item:active, .tag-cloud-item:focus { color: var(--ink45); text-decoration: none !important; outline: none; }
.tag-cloud-item:hover { color: var(--ink); text-decoration: underline; }
.tag-cloud-sep {
  color: var(--ink55); margin: 0 4px;
  font-size: 11px; user-select: none;
}
.tag-cloud-more {
  font-size: 11px; font-weight: 475; color: var(--ink45);
  cursor: pointer; text-decoration: none;
  transition: color .1s;
}
.tag-cloud-more:hover { color: var(--ink); text-decoration: underline; }

/* ── Footer ─────────────────────────────────────────────── */
.lr-footer { display: block; padding: 0; }

</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo logo-light" alt="LATE RECORDS">
      <img src="images/late-records-logo-dark.png" class="header-logo logo-dark" alt="LATE RECORDS">
    </a>
    <div class="header-right">
      <button class="search-btn" id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">

<script src="script.js"></script>

<script>

function _escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Info rotator ────────────────────────────────────────────
(function() {
  const slides = [
    { title: 'Shop Info', text: 'Catalog updated daily with new pressings and used record finds.' },
    { title: 'Shipping & Handling', text: 'All records ship in custom mailers. Allow 3–5 business days for domestic delivery.' },
    { title: 'Condition & Grading', text: 'All records graded visually and play-tested. Condition noted on each listing.' }
  ];
  let idx = 0;
  const titleEl = document.getElementById('infoTitle');
  const textEl  = document.getElementById('infoText');
  function show(i) {
    idx = (i + slides.length) % slides.length;
    titleEl.textContent = slides[idx].title;
    textEl.textContent  = slides[idx].text;
  }
  show(0);
  document.getElementById('infoPrev').addEventListener('click', (e) => { e.stopPropagation(); show(idx - 1); });
  document.getElementById('infoNext').addEventListener('click', (e) => { e.stopPropagation(); show(idx + 1); });
})();

function buildCarousel(albums) {
  const featured = albums.filter(a => String(a.featured).toLowerCase() === 'yes').slice(0, 5);
  const cards = featured.length >= 1 ? featured : albums.slice(0, 5);
  const track = document.getElementById('carouselTrack');
  let current = 0;
  track.innerHTML = '';
  cards.forEach((album) => {
    const tags     = LR.ui.splitPipe(album.genre).slice(0, 3);
    const albumUrl = `albums/album.html?id=${encodeURIComponent(album.album_id)}`;
    const card     = document.createElement('div');
    card.className = 'carousel-card';
    card.addEventListener('click', () => location.href = albumUrl);
    card.innerHTML = `
  <div class="card-inner">
    <div class="card-top">
      <div class="card-staff-pick">Staff Pick</div>
      <div class="card-artist">${_escHTML(album.artist)}</div>
      <div class="card-title">${_escHTML(album.title)}</div>
      <div class="card-meta">
        <div class="card-tags">
          ${tags.map(t => `
            <span class="card-tag" onclick="event.stopPropagation();location.href='genre.html?g=${encodeURIComponent(t.toLowerCase())}'">
              ${_escHTML(t)}
            </span>
          `).join('')}
        </div>
        
        <span class="card-format">${_escHTML(album.format || 'LP')}</span>
        
        ${album.condition ? `
          <span class="card-meta-divider"></span>
          <span class="card-format">${_escHTML(album.condition)}</span>
        ` : ''}
      </div>
    </div>
  </div>`;
    track.appendChild(card);
  });
  const viewport = document.querySelector('.carousel-viewport');

  const progressContainer = document.createElement('div');
  progressContainer.style.cssText = 'display:flex;gap:3px;margin-top:10px;';
  viewport.parentNode.insertBefore(progressContainer, viewport.nextSibling);

  const bars = [];
  cards.forEach((_, i) => {
    const b = document.createElement('div');
    b.style.cssText = 'flex:1;height:2px;background:var(--ink15);transition:height .2s ease,background .2s ease;';
    progressContainer.appendChild(b);
    bars.push(b);
  });

  function goTo(index) {
    if (index < 0) index = cards.length - 1;
    if (index >= cards.length) index = 0;
    current = index;
    track.style.transform = `translateX(-${current * 100}%)`;
    bars.forEach((b, i) => {
      b.style.height = i === current ? '4px' : '2px';
      b.style.background = i === current ? 'var(--ink)' : 'var(--ink15)';
    });
  }
  goTo(0);
  document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current - 1); });
  document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current + 1); });
}

// ── Art rotator (marquee) ──────────────────────────────────
function buildArtRotator(catalog) {
  const track = document.getElementById('artRotatorTrack');
  if (!track) return;
  const shuffled = [...catalog].sort(() => Math.random() - 0.5);
  const items = shuffled.filter(a => a.album_id);
  const all = [...items, ...items];
  track.innerHTML = all.map(a => {
    const src = `images/${a.album_id}.jpg`;
    const url = `albums/album.html?id=${encodeURIComponent(a.album_id)}`;
    return `<a class="art-rotator-item" href="${url}"><img src="${src}" alt="${_escHTML(a.title)}" loading="lazy"></a>`;
  }).join('');
}

// ── Search bar toggle ──────────────────────────────────────
(function() {
  var btn   = document.getElementById('searchBtn');
  var bar   = document.getElementById('searchBar');
  var input = document.getElementById('searchInput');

  function openSearch() {
    bar.classList.add('open');
    document.body.classList.add('search-open');
    setTimeout(function() { input.focus(); }, 180);
  }

  function closeSearch() {
    bar.classList.remove('open');
    document.body.classList.remove('search-open');
    document.body.classList.remove('search-active');
    input.value = '';
    document.getElementById('searchClear').style.display = 'none';
    input.dispatchEvent(new Event('input'));
  }

  input.addEventListener('input', function() {
    document.body.classList.toggle('search-active', input.value.trim().length > 0);
  });

  btn.addEventListener('click', function() {
    bar.classList.contains('open') ? closeSearch() : openSearch();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && bar.classList.contains('open')) closeSearch();
  });

  document.addEventListener('click', function(e) {
    if (
      bar.classList.contains('open') &&
      !e.target.closest('#searchBar') &&
      !e.target.closest('#searchBtn') &&
      !e.target.closest('#catalogTable') &&
      !e.target.closest('#suggestionsHeader') &&
      !e.target.closest('.az-nav') &&
      !e.target.closest('.no-results-empty')
    ) {
      closeSearch();
    }
  });
})();

window.availFilterActive = false;

function toggleAvail() {
  window.availFilterActive = !window.availFilterActive;
  document.getElementById('availToggle').classList.toggle('active', window.availFilterActive);
  applyAvailToggle();
}

document.addEventListener('DOMContentLoaded', async () => {
  initSearch();

  async function loadCatalog(retries) {
    for (let i = 0; i <= retries; i++) {
      try {
        return await LR.api.catalog();
      } catch(e) {
        if (i < retries) await new Promise(r => setTimeout(r, 1000 * (i + 1)));
      }
    }
    return null;
  }

  const catalog = await loadCatalog(2);
  if (catalog) {
    window._catalogCache = catalog;
    if (typeof LR_setLastUpdated === 'function') LR_setLastUpdated(new Date().toISOString());
    buildCarousel(catalog);
    buildTable(catalog);
    buildAZNav(catalog);
    buildArtRotator(catalog);
    loadTagCloud(catalog);
  } else {
    document.getElementById('carouselTrack').innerHTML = '';
    document.getElementById('catalogList').innerHTML =
      `<tr><td colspan="5" style="padding:40px 0;font-size:13px;color:var(--ink55)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    document.querySelectorAll('.rec-art-wrap img').forEach(function(img) {
      img.parentNode.style.opacity = '';
      var src = img.src;
      img.src = '';
      img.src = src;
    });
  }
});

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

/* ── Grid ───────────────────────────────────────────────────── */

.album-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.album-card {
  text-decoration: none;
  color: #000;
  display: block;
}

.album-cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #f0f0f0;
}

.album-cover.sold-out { opacity: .5; }

.album-info { margin-top: 10px; }

.album-title {
  font-size: 14px;
  font-weight: 600;
  margin: 0;
  line-height: 1.3;
}

.album-artist {
  font-size: 12px;
  color: #555;
  margin-top: 3px;
}

.album-status {
  font-size: 11px;
  margin-top: 4px;
  color: #aaa;
}

.album-status.available { color: #3a7d52; }

/* ── Skeleton ───────────────────────────────────────────────── */

.skeleton-card .album-cover {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

.sk-line {
  height: 12px;
  border-radius: 2px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  margin-top: 8px;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Responsive ─────────────────────────────────────────────── */

@media (max-width: 900px) {
  .album-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
}

@media (max-width: 600px) {
  .album-grid { grid-template-columns: 1fr; gap: 18px; }
}

</style>
</head>
<body>

<!-- HEADER -->
<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<!-- MAIN -->
<div class="container">
  <div class="album-grid" id="albumGrid">
    <!-- Skeleton placeholders -->
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:45%"></div></div>
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:60%"></div><div class="sk-line" style="width:40%"></div></div>
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:75%"></div><div class="sk-line" style="width:50%"></div></div>
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:55%"></div><div class="sk-line" style="width:35%"></div></div>
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:65%"></div><div class="sk-line" style="width:45%"></div></div>
    <div class="skeleton-card album-card"><div class="album-cover"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:40%"></div></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="fixed-footer">
  <div class="footer-inner">
    <span class="footer-left" id="datetime-footer"></span>
    <div class="footer-links">
      <a href="https://instagram.com/late.records.ph" target="_blank" rel="noopener">
        Instagram<span class="external-arrow">↗</span>
      </a>
      <a href="guide.html">Guide</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const grid = document.getElementById('albumGrid');

  try {
    const catalog = await LR.api.catalog();

    grid.innerHTML = catalog.map(item => {
      const sold = item.status !== 'available';
      return `
        <a href="albums/album.html?id=${item.album_id}" class="album-card">
          <img
            src="images/${item.album_id}.jpg"
            class="album-cover${sold ? ' sold-out' : ''}"
            alt="${item.title}"
            loading="lazy"
          >
          <div class="album-info">
            <p class="album-title">${item.title}</p>
            <p class="album-artist">${item.artist}</p>
            <p class="album-status ${sold ? '' : 'available'}">${sold ? 'Sold Out' : LR.ui.peso(item.price)}</p>
          </div>
        </a>
      `;
    }).join('');

  } catch (e) {
    grid.innerHTML = '<p style="color:#888;font-size:14px;grid-column:1/-1">Could not load catalog. Please refresh.</p>';
  }
});
</script>
</body>
</html>

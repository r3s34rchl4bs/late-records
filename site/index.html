<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="stylesheet" href="fonts/inter.css">
<script>document.documentElement.classList.toggle('dark', localStorage.getItem('lr_theme') === 'dark')</script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  --bg:         #e2e2e2;
  --bg-dot:     rgba(0,0,0,.08);
  --ink:        #1a1a14;
  --ink55:      rgba(26,26,20,.55);
  --ink45:      rgba(26,26,20,.45);
  --ink30:      rgba(26,26,20,.30);
  --ink15:      rgba(26,26,20,.15);
  --border:     rgba(26,26,20,.22);
  --border-mid: rgba(26,26,20,.12);
  --border-tag: rgba(26,26,20,.24);
  --art-bg:     rgba(26,26,20,.07);
  --btn-bg:     #1a1a14;
  --btn-fg:     #e2e2e2;
}

html.dark {
  --bg:         #141410;
  --bg-dot:     rgba(255,255,255,.04);
  --ink:        #e8e8df;
  --ink55:      rgba(232,232,223,.55);
  --ink45:      rgba(232,232,223,.42);
  --ink30:      rgba(232,232,223,.26);
  --ink15:      rgba(232,232,223,.12);
  --border:     rgba(232,232,223,.18);
  --border-mid: rgba(232,232,223,.1);
  --border-tag: rgba(232,232,223,.2);
  --art-bg:     rgba(232,232,223,.06);
  --btn-bg:     #e8e8df;
  --btn-fg:     #141410;
}

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  pointer-events: none; z-index: -1;
}

img { display: block; max-width: 100%; }
a   { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

html.no-transitions * { transition: none !important; }

/* ── Header ──────────────────────────────────────────────── */
.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  z-index: 1000; border-bottom: 1px solid var(--border); height: 74px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.header-right { display: flex; align-items: center; gap: 16px; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink);
}
.cart-link:hover { color: var(--ink55); }
.theme-toggle {
  background: none; border: none; padding: 4px; color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s; flex-shrink: 0;
}
.theme-toggle:hover { opacity: .6; }
.theme-toggle .icon-sun,
.theme-toggle .icon-moon { width: 18px; height: 18px; display: block; }
html:not(.dark) .theme-toggle .icon-moon { display: none; }
html.dark        .theme-toggle .icon-sun  { display: none; }
.logo-dark            { display: none; }
html.dark .logo-light { display: none; }
html.dark .logo-dark  { display: block; }

/* ── Container ───────────────────────────────────────────── */
.container {
  max-width: 1200px; margin: 0 auto; padding: 74px 30px 0;
}

/* ── Needle Drop ─────────────────────────────────────────── */
.needle-drop {
  padding: 48px 0 40px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.nd-eyebrow {
  font-size: 10px; font-weight: 600; letter-spacing: .14em;
  text-transform: uppercase; color: var(--ink30); margin-bottom: 18px;
}
.nd-artist {
  font-size: 12px; font-weight: 500; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink45); margin-bottom: 12px;
}
.nd-title {
  font-size: 72px; font-weight: 500; line-height: 1; letter-spacing: -.04em;
  color: var(--ink); transition: opacity .15s; margin-bottom: 24px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.needle-drop:hover .nd-title { opacity: .6; }
.nd-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.nd-format {
  font-size: 11px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink45);
}
.nd-divider { width: 1px; height: 10px; background: var(--ink30); flex-shrink: 0; }
.nd-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.nd-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: 1px solid var(--border-tag);
  padding: 3px 8px; color: var(--ink45);
}
.nd-link {
  margin-left: auto; font-size: 11px; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase; color: var(--ink30);
  transition: color .15s;
}
.needle-drop:hover .nd-link { color: var(--ink); }

/* ── A–Z Bar ─────────────────────────────────────────────── */
.az-bar {
  display: flex; border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.az-bar::-webkit-scrollbar { display: none; }
.az-btn {
  flex-shrink: 0; background: none; border: none;
  padding: 9px 9px; font-size: 11px; font-weight: 500;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink30); cursor: pointer; line-height: 1;
  transition: color .1s, background .1s;
}
.az-btn:hover { color: var(--ink); }
.az-btn.active { background: var(--btn-bg); color: var(--btn-fg); }

/* ── Search ──────────────────────────────────────────────── */
.search-row {
  display: flex; align-items: center; margin: 10px 0;
}
.search-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px; font-weight: 400; color: var(--ink);
  padding: 5px 0; outline: none; letter-spacing: .01em;
}
.search-input::placeholder { color: var(--ink30); }
.search-clear {
  border: none; background: none; padding: 0 0 0 8px;
  font-size: 16px; color: var(--ink30); cursor: pointer;
  line-height: 1; display: none; transition: color .1s;
}
.search-clear:hover { color: var(--ink); }
.search-count {
  font-size: 10px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink30);
  padding-left: 14px; white-space: nowrap; flex-shrink: 0;
}
.suggestions-header {
  display: none; padding: 28px 0 16px;
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink45);
}
.suggestions-header span { color: var(--ink); }
.suggestions-header.is-loading::after {
  content: ''; animation: ellipsis 1.2s steps(4, end) infinite;
}
@keyframes ellipsis {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
}
.no-results-empty {
  padding: 40px 0; font-size: 13px; color: var(--ink30);
  letter-spacing: .01em; display: none;
}
.rec-title mark, .rec-artist mark {
  background: var(--border-mid); color: var(--ink); padding: 0 1px; border-radius: 1px;
}
.tbl tbody tr.is-suggestion td:nth-child(2) {
  border-left: 2px solid var(--border-mid); padding-left: 10px;
}

/* ── Availability toggle ─────────────────────────────────── */
.avail-toggle {
  width: 14px; height: 14px; border: 1.5px solid var(--ink30);
  background: transparent; cursor: pointer; flex-shrink: 0;
  margin-left: 12px; padding: 0; transition: background .12s, border-color .12s;
}
.avail-toggle.active { background: var(--btn-bg); border-color: var(--btn-bg); }

/* ── Table ───────────────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.c-art    { width: 52px; }
col.c-title  { width: auto; }
col.c-genre  { width: 14%; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  position: sticky; top: 74px; z-index: 30;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  box-shadow: 0 -1px 0 var(--border), 0 1px 0 rgba(26,26,20,.26);
  padding: 10px 12px 10px 0; font-size: 11px; font-weight: 500;
  letter-spacing: .09em; text-transform: uppercase; color: var(--ink55);
  text-align: left; vertical-align: bottom;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }
.tbl thead th.c-art   { padding-right: 0; }

.tbl tbody tr { cursor: pointer; transition: color 0.1s linear; }
.tbl tbody tr:hover .rec-title, .tbl tbody tr:hover .rec-artist,
.tbl tbody tr:hover .rec-stock { color: var(--ink); }
.tbl tbody td {
  padding: 10px 12px 10px 0; border-bottom: 1px solid var(--border-mid); vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-right: 0; }
.tbl thead th.c-stock { padding-bottom: 10px; padding-right: 0; }
.tbl tbody td.c-art   { padding-right: 10px; }

.rec-art-wrap {
  width: 38px; height: 38px; overflow: hidden; flex-shrink: 0; background: var(--art-bg);
}
.rec-art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.tbl tbody tr.sold .rec-art-wrap { opacity: .35; }

.rec-title {
  font-size: 15px; font-weight: 500; line-height: 1.25; letter-spacing: -.01em;
  transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rec-artist {
  font-size: 12px; font-weight: 400; color: var(--ink55);
  margin-top: 3px; line-height: 1.4; transition: color 0.1s linear;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.genre-tag {
  display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink55); border: 1px solid var(--ink30);
  padding: 3px 7px; line-height: 1.4; white-space: nowrap; cursor: pointer;
  transition: color 0.1s linear, border-color 0.1s linear;
}
.genre-tag:hover { color: var(--ink); border-color: var(--ink); }
.rec-format {
  font-size: 11px; font-weight: 400; letter-spacing: .05em;
  text-transform: uppercase; color: var(--ink55);
}
.rec-stock {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: var(--ink); }
.sdot.s { background: var(--ink30); }

.tbl tbody tr.sold .rec-title  { color: var(--ink55); }
.tbl tbody tr.sold .rec-artist { color: var(--ink30); }
.tbl tbody tr.sold .genre-tag  { color: var(--ink30); border-color: var(--ink15); }
.tbl tbody tr.sold .rec-format { color: var(--ink30); }
.tbl tbody tr.sold .rec-stock  { color: var(--ink30); }
.tbl tbody tr.sold .sdot       { background: var(--ink30) !important; }

/* ── Skeleton ────────────────────────────────────────────── */
.sk {
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite;
}
html.dark .sk {
  background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.05) 75%);
  background-size: 200% 100%;
}
@keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── The Crate ───────────────────────────────────────────── */
.crate-section {
  margin-top: 64px;
  border-top: 1px solid var(--border);
}
.crate-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.crate-label {
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink55);
}
.dig-btn {
  font-size: 10px; font-weight: 500; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink30);
  background: none; border: 1px solid var(--border);
  padding: 4px 10px; transition: color .1s, border-color .1s, background .1s;
}
.dig-btn:hover { color: var(--btn-fg); background: var(--btn-bg); border-color: var(--btn-bg); }
.crate-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border-mid);
}
.crate-item {
  background: var(--bg); padding: 18px;
  cursor: pointer; transition: background .1s;
}
.crate-item:hover { background: var(--art-bg); }
.crate-item-artist {
  font-size: 10px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink30); margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.crate-item-title {
  font-size: 15px; font-weight: 500; line-height: 1.25; letter-spacing: -.01em;
  color: var(--ink); margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.crate-item-footer {
  display: flex; align-items: center; gap: 6px;
}
.crate-item-format {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink45);
}
.crate-item-tag {
  font-size: 9px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; border: 1px solid var(--border-tag);
  padding: 2px 6px; color: var(--ink45);
}
.crate-item-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--ink30); flex-shrink: 0; margin-left: auto;
}
.crate-item.available .crate-item-dot { background: var(--ink); }

/* ── Footer ──────────────────────────────────────────────── */
.site-footer {
  margin-top: 80px; padding: 24px 0 48px;
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;
}
.footer-brand {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink); display: block; margin-bottom: 6px;
}
.footer-tagline {
  font-size: 11px; color: var(--ink30); letter-spacing: .01em;
}
.footer-right { text-align: right; }
.footer-location {
  font-size: 11px; color: var(--ink30); letter-spacing: .01em;
  display: block; margin-bottom: 5px;
}
.footer-datetime {
  font-size: 10px; color: var(--ink30); letter-spacing: .04em;
  font-variant-numeric: tabular-nums;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-art    { width: 44px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  col.c-genre { width: auto; }
  .tbl thead th.c-genre { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-genre { text-align: right; padding-right: 0; }
  .nd-title   { font-size: 52px; }
  .rec-title  { font-size: 14px; }
  .rec-artist { font-size: 11px; }
  .rec-art-wrap { width: 32px; height: 32px; }
  .crate-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
  .container    { padding: 74px 20px 0; }
  .header-inner { padding: 0 20px; }
  .nd-title     { font-size: 34px; letter-spacing: -.03em; margin-bottom: 18px; }
  .nd-link      { display: none; }
  .needle-drop  { padding: 32px 0 26px; }
  .tbl thead th { top: 74px; font-size: 10px; }
  .rec-title    { font-size: 13px; }
  .rec-artist   {
    font-size: 11px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .genre-tag    { font-size: 9px; padding: 2px 5px; }
  col.c-art     { width: 38px; }
  .rec-art-wrap { width: 28px; height: 28px; }
  .tbl tbody td.c-art { padding-right: 6px; }
  .crate-grid   { grid-template-columns: 1fr; }
  .site-footer  { flex-direction: column; gap: 12px; }
  .footer-right { text-align: left; }
  .search-count { display: none; }
}

</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo logo-light" alt="LATE RECORDS">
      <img src="images/late-records-logo-dark.png" class="header-logo logo-dark" alt="LATE RECORDS">
    </a>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93"  y1="4.93"  x2="7.05" y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95"/>
          <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<div class="container">

  <!-- ── Needle Drop ─────────────────────────────────────── -->
  <section class="needle-drop" id="needleDrop">
    <div class="nd-eyebrow sk" style="width:120px;height:10px;margin-bottom:18px"></div>
    <div class="nd-artist sk" style="width:160px;height:12px;margin-bottom:16px"></div>
    <div class="sk" style="width:55%;height:54px;margin-bottom:24px"></div>
    <div class="sk" style="width:220px;height:11px"></div>
  </section>

  <!-- ── A–Z Bar ─────────────────────────────────────────── -->
  <nav class="az-bar" id="azBar">
    <button class="az-btn active" data-letter="ALL" onclick="setAZFilter('ALL')">All</button>
    <button class="az-btn" data-letter="0-9" onclick="setAZFilter('0-9')">0–9</button>
    <button class="az-btn" data-letter="A" onclick="setAZFilter('A')">A</button>
    <button class="az-btn" data-letter="B" onclick="setAZFilter('B')">B</button>
    <button class="az-btn" data-letter="C" onclick="setAZFilter('C')">C</button>
    <button class="az-btn" data-letter="D" onclick="setAZFilter('D')">D</button>
    <button class="az-btn" data-letter="E" onclick="setAZFilter('E')">E</button>
    <button class="az-btn" data-letter="F" onclick="setAZFilter('F')">F</button>
    <button class="az-btn" data-letter="G" onclick="setAZFilter('G')">G</button>
    <button class="az-btn" data-letter="H" onclick="setAZFilter('H')">H</button>
    <button class="az-btn" data-letter="I" onclick="setAZFilter('I')">I</button>
    <button class="az-btn" data-letter="J" onclick="setAZFilter('J')">J</button>
    <button class="az-btn" data-letter="K" onclick="setAZFilter('K')">K</button>
    <button class="az-btn" data-letter="L" onclick="setAZFilter('L')">L</button>
    <button class="az-btn" data-letter="M" onclick="setAZFilter('M')">M</button>
    <button class="az-btn" data-letter="N" onclick="setAZFilter('N')">N</button>
    <button class="az-btn" data-letter="O" onclick="setAZFilter('O')">O</button>
    <button class="az-btn" data-letter="P" onclick="setAZFilter('P')">P</button>
    <button class="az-btn" data-letter="Q" onclick="setAZFilter('Q')">Q</button>
    <button class="az-btn" data-letter="R" onclick="setAZFilter('R')">R</button>
    <button class="az-btn" data-letter="S" onclick="setAZFilter('S')">S</button>
    <button class="az-btn" data-letter="T" onclick="setAZFilter('T')">T</button>
    <button class="az-btn" data-letter="U" onclick="setAZFilter('U')">U</button>
    <button class="az-btn" data-letter="V" onclick="setAZFilter('V')">V</button>
    <button class="az-btn" data-letter="W" onclick="setAZFilter('W')">W</button>
    <button class="az-btn" data-letter="X" onclick="setAZFilter('X')">X</button>
    <button class="az-btn" data-letter="Y" onclick="setAZFilter('Y')">Y</button>
    <button class="az-btn" data-letter="Z" onclick="setAZFilter('Z')">Z</button>
  </nav>

  <!-- ── Search + Table ─────────────────────────────────── -->
  <div class="search-row">
    <input class="search-input" id="searchInput" type="search"
      autocomplete="off" spellcheck="false"
      placeholder="Search by title, artist, genre, format…">
    <button class="search-clear" id="searchClear" aria-label="Clear search">&#215;</button>
    <span class="search-count" id="searchCount"></span>
    <button class="avail-toggle" id="availToggle" aria-label="Show available only" onclick="toggleAvail()"></button>
  </div>

  <div class="suggestions-header" id="suggestionsHeader"></div>
  <div class="no-results-empty" id="noResultsEmpty">Nothing found.</div>

  <table class="tbl" id="catalogTable">
    <colgroup>
      <col class="c-art"><col class="c-title"><col class="c-genre"><col class="c-format"><col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-art"></th>
        <th class="c-title">Title / Artist</th>
        <th class="c-genre">Genre</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="catalogList">
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:55%;margin-bottom:8px"></div><br><div class="sk" style="width:30%"></div></td><td class="c-genre"><div class="sk" style="width:70%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:68%;margin-bottom:8px"></div><br><div class="sk" style="width:38%"></div></td><td class="c-genre"><div class="sk" style="width:60%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:44%;margin-bottom:8px"></div><br><div class="sk" style="width:24%"></div></td><td class="c-genre"><div class="sk" style="width:78%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:60%;margin-bottom:8px"></div><br><div class="sk" style="width:34%"></div></td><td class="c-genre"><div class="sk" style="width:63%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-art"></td><td class="c-title"><div class="sk" style="width:50%;margin-bottom:8px"></div><br><div class="sk" style="width:28%"></div></td><td class="c-genre"><div class="sk" style="width:72%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
    </tbody>
  </table>

  <!-- ── The Crate ───────────────────────────────────────── -->
  <section class="crate-section" id="crateSection">
    <div class="crate-header">
      <span class="crate-label">The Crate</span>
      <button class="dig-btn" id="digBtn">Dig Again</button>
    </div>
    <div class="crate-grid" id="crateGrid"></div>
  </section>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="footer-left">
      <span class="footer-brand">Late Records</span>
      <span class="footer-tagline">Curated vinyl — rare, used, and hard to find.</span>
    </div>
    <div class="footer-right">
      <span class="footer-location">Bacolod City, Philippines</span>
      <span class="footer-datetime" id="datetime-footer"></span>
    </div>
  </footer>

</div>

<script src="script.js"></script>
<script src="catalog.js"></script>
<script src="search.js"></script>
<script>

function _escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Needle Drop ─────────────────────────────────────────── */
function buildNeedleDrop(catalog) {
  const section = document.getElementById('needleDrop');
  if (!section) return;
  const featured = catalog.filter(a => String(a.featured).toLowerCase() === 'yes' && a.status === 'available');
  const pick = featured.length > 0 ? featured[0] : catalog.find(a => a.status === 'available') || catalog[0];
  if (!pick) return;
  const url  = `albums/album.html?id=${encodeURIComponent(pick.album_id)}`;
  const tags = LR.ui.splitPipe(pick.genre).slice(0, 2);
  section.onclick = () => location.href = url;
  section.innerHTML = `
    <div class="nd-eyebrow">The Needle Drop — Staff Pick</div>
    <div class="nd-artist">${_escHTML(pick.artist)}</div>
    <div class="nd-title">${_escHTML(pick.title)}</div>
    <div class="nd-meta">
      <span class="nd-format">${_escHTML(pick.format || 'LP')}</span>
      ${tags.length ? '<span class="nd-divider"></span>' : ''}
      <div class="nd-tags">${tags.map(t => `<span class="nd-tag">${_escHTML(t)}</span>`).join('')}</div>
      <span class="nd-link">View Record →</span>
    </div>`;
}

/* ── A–Z Filter ──────────────────────────────────────────── */
window._azFilter = 'ALL';

function setAZFilter(letter) {
  window._azFilter = letter;
  document.querySelectorAll('.az-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.letter === letter);
  });
  // Clear search state
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  if (input) input.value = '';
  if (clear) clear.style.display = 'none';
  // Filter catalog and re-render
  const catalog = window._catalogCache;
  if (!catalog) return;
  let filtered = catalog;
  if (letter !== 'ALL') {
    if (letter === '0-9') filtered = catalog.filter(a => /^[0-9]/.test(a.artist));
    else filtered = catalog.filter(a => a.artist.trim().toUpperCase().startsWith(letter));
  }
  buildTable(filtered);
}

/* ── The Crate ───────────────────────────────────────────── */
function buildCrate(catalog) {
  const grid = document.getElementById('crateGrid');
  if (!grid || !catalog) return;
  const available = catalog.filter(a => a.status === 'available');
  const pool      = available.length >= 6 ? available : catalog;
  const shuffled  = pool.slice().sort(() => Math.random() - .5);
  const picks     = shuffled.slice(0, 6);
  grid.innerHTML  = picks.map(a => {
    const url   = `albums/album.html?id=${encodeURIComponent(a.album_id)}`;
    const genre = LR.ui.splitPipe(a.genre)[0] || '';
    const avail = a.status === 'available';
    return `<div class="crate-item${avail ? ' available' : ''}" onclick="location.href='${url}'">
      <div class="crate-item-artist">${_escHTML(a.artist)}</div>
      <div class="crate-item-title">${_escHTML(a.title)}</div>
      <div class="crate-item-footer">
        <span class="crate-item-format">${_escHTML(a.format || 'LP')}</span>
        ${genre ? `<span class="crate-item-tag">${_escHTML(genre)}</span>` : ''}
        <span class="crate-item-dot"></span>
      </div>
    </div>`;
  }).join('');
}

/* ── Availability toggle ─────────────────────────────────── */
window.availFilterActive = false;

function toggleAvail() {
  window.availFilterActive = !window.availFilterActive;
  document.getElementById('availToggle').classList.toggle('active', window.availFilterActive);
  applyAvailToggle();
}

/* ── Boot ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  initSearch();

  document.getElementById('digBtn').addEventListener('click', () => {
    buildCrate(window._catalogCache);
  });

  async function loadCatalog(retries) {
    for (let i = 0; i <= retries; i++) {
      try { return await LR.api.catalog(); }
      catch(e) { if (i < retries) await new Promise(r => setTimeout(r, 1000 * (i + 1))); }
    }
    return null;
  }

  const catalog = await loadCatalog(2);
  if (catalog) {
    window._catalogCache = catalog;
    buildNeedleDrop(catalog);
    buildTable(catalog);
    buildCrate(catalog);
  } else {
    document.getElementById('needleDrop').innerHTML =
      `<div style="font-size:13px;color:var(--ink30)">Could not load catalog. Please refresh.</div>`;
    document.getElementById('catalogList').innerHTML =
      `<tr><td colspan="5" style="padding:40px 0;font-size:13px;color:var(--ink55)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

/* ── Page-level color overrides ─────────────────────────────── */

:root {
  --bg:          #e2e2e2;
  --text:        #1a1a14;
  --text-mid:    rgba(26,26,20,.6);
  --text-dim:    rgba(26,26,20,.35);
  --rule:        rgba(26,26,20,.1);
  --rule-mid:    rgba(26,26,20,.18);
  --rule-strong: rgba(26,26,20,.28);
}

html, body {
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  color: var(--text);
}

.fixed-header {
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
}

/* Logo */
.header-logo       { filter: none; opacity: 1; }
.header-logo:hover { opacity: .5; }

/* Cart — no border/box */
.cart-link {
  color: var(--text);
  border: none;
  padding: 0;
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
  font-weight: 600;
}
.cart-link:hover { background: none; color: var(--text-mid); }

/* Remove footer bar entirely */
.fixed-footer { display: none; }

/* ── Catalog table ──────────────────────────────────────────── */

/* Mobile: 1 col — title only */
.catalog-header {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 0 0 10px;
  border-bottom: 1px solid var(--rule-strong);
  margin-bottom: 0;
}

.catalog-header-col {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-mid);
  font-weight: 600;
}

.catalog-header-col.right { text-align: right; }
.col-format    { display: none; }
.col-stock-hdr { display: none; }
.col-genre-hdr { display: none; }

/* Desktop: 4 cols */
@media (min-width: 901px) {
  .catalog-header { grid-template-columns: 1fr 140px 120px 80px; }
  .col-format     { display: block; }
  .col-stock-hdr  { display: block; text-align: right; }
  .col-genre-hdr  { display: block; text-align: left; }
}

/* Genre as clickable link — stop propagation so row click still works */
a.row-genre {
  text-decoration: none;
  transition: color .15s;
  cursor: pointer;
}
a.row-genre:hover { color: var(--text); text-decoration: underline; }

.catalog-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 18px 0;
  border-bottom: 1px solid var(--rule);
  text-decoration: none;
  color: var(--text);
  transition: background .15s;
  cursor: pointer;
  align-items: center;
  margin: 0 calc(-1 * var(--pad-h));
  padding-left: var(--pad-h);
  padding-right: var(--pad-h);
}

.catalog-row:hover { background: rgba(0,0,0,.06); }
.catalog-row.sold  { opacity: .4; }

.row-title-block { min-width: 0; }

.row-title {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -.01em;
  word-break: break-word;
}

.row-artist {
  font-size: 11px;
  color: var(--text-mid);
  margin-top: 3px;
  font-weight: 600;
  letter-spacing: .01em;
}

/* Genre: hidden on mobile, shown in column on desktop */
.row-genre {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-mid);
  font-weight: 600;
  align-self: center;
  display: none;
}

/* Format + stock: hidden on mobile */
.row-format { display: none; }
.row-stock  { display: none; }

@media (min-width: 901px) {
  .catalog-row {
    grid-template-columns: 1fr 140px 120px 80px;
    padding: 16px var(--pad-h);
  }
  .row-genre  { display: block; text-align: left; }
  .row-format {
    display: block;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-mid);
    font-weight: 600;
    align-self: center;
  }
  .row-stock {
    display: flex;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 700;
    align-self: center;
    text-align: right;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
}

.stock-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.stock-dot.avail { background: var(--text); }
.stock-dot.sold  { background: var(--text-dim); }

/* ── Skeleton rows ──────────────────────────────────────────── */

.sk-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 18px var(--pad-h);
  border-bottom: 1px solid var(--rule);
  margin: 0 calc(-1 * var(--pad-h));
  align-items: center;
}

@media (min-width: 901px) {
  .sk-row { grid-template-columns: 1fr 140px 120px 80px; }
}

.sk-line {
  height: 11px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.11) 50%, rgba(0,0,0,.06) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.shop-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
}

</style>
</head>
<body>

<!-- HEADER -->
<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <div class="shop-heading">
    <div class="catalog-header" style="flex:1;margin-bottom:0;padding-bottom:0;border-bottom:none;">
      <span class="catalog-header-col">Title / Artist</span>
      <span class="catalog-header-col col-format" style="display:none;">Format</span>
      <span class="catalog-header-col col-genre-hdr">Genre</span>
      <span class="catalog-header-col col-stock-hdr right">Stock</span>
    </div>
  </div>
  <div style="border-bottom:1px solid var(--rule-strong);margin:0 calc(-1 * var(--pad-h)) 0;"></div>

  <div id="catalogList">
    <div class="sk-row"><div><div class="sk-line" style="width:55%;margin-bottom:8px"></div><div class="sk-line" style="width:30%"></div></div><div class="sk-line" style="width:60%"></div><div class="sk-line" style="width:70%"></div></div>
    <div class="sk-row"><div><div class="sk-line" style="width:70%;margin-bottom:8px"></div><div class="sk-line" style="width:40%"></div></div><div class="sk-line" style="width:50%"></div><div class="sk-line" style="width:60%"></div></div>
    <div class="sk-row"><div><div class="sk-line" style="width:45%;margin-bottom:8px"></div><div class="sk-line" style="width:25%"></div></div><div class="sk-line" style="width:55%"></div><div class="sk-line" style="width:65%"></div></div>
    <div class="sk-row"><div><div class="sk-line" style="width:60%;margin-bottom:8px"></div><div class="sk-line" style="width:35%"></div></div><div class="sk-line" style="width:45%"></div><div class="sk-line" style="width:70%"></div></div>
    <div class="sk-row"><div><div class="sk-line" style="width:50%;margin-bottom:8px"></div><div class="sk-line" style="width:28%"></div></div><div class="sk-line" style="width:58%"></div><div class="sk-line" style="width:62%"></div></div>
  </div>

</div>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const list = document.getElementById('catalogList');

  const formatCols = document.querySelectorAll('.col-format');
  function updateHeaderCols() {
    const isDesktop = window.innerWidth >= 901;
    formatCols.forEach(el => el.style.display = isDesktop ? 'block' : 'none');
  }
  updateHeaderCols();
  window.addEventListener('resize', updateHeaderCols);

  try {
    const catalog = await LR.api.catalog();

    list.innerHTML = catalog.map(item => {
      const sold   = item.status !== 'available';
      const genre  = (item.genre || '').split('||')[0].trim();
      const format = item.format || 'LP';
      return `
        <a href="albums/album.html?id=${item.album_id}" class="catalog-row${sold ? ' sold' : ''}">
          <div class="row-title-block">
            <div class="row-title">${item.title}</div>
            <div class="row-artist">${item.artist}</div>
          </div>
          <div class="row-format">${format}</div>
          <a class="row-genre" href="genre.html?g=${encodeURIComponent(genre.toLowerCase())}" onclick="event.stopPropagation()">${genre}</a>
          <div class="row-stock">
            <span class="stock-dot ${sold ? 'sold' : 'avail'}"></span>
            <span>${sold ? 'Sold' : 'Avail'}</span>
          </div>
        </a>
      `;
    }).join('');

  } catch (e) {
    list.innerHTML = '<p style="color:var(--text-dim);font-size:13px;padding:40px 0;">Could not load catalog. Please refresh.</p>';
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  color: #1a1a14;
  -webkit-font-smoothing: antialiased;
}

img { display: block; max-width: 100%; }
a   { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  z-index: 1000;
  border-bottom: 1px solid rgba(26,26,20,.22);
  height: 74px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: #1a1a14; text-decoration: none;
}
.cart-link:hover { color: rgba(26,26,20,.5); }

.container {
  max-width: 1200px; margin: 0 auto; padding: 104px 30px 80px;
}

/* ── Carousel ────────────────────────────────────────────── */
.carousel-section { margin-bottom: 0; }

.section-divider {
  border: none;
  margin: 20px 0;
}

.carousel-viewport {
  height: 220px; overflow: hidden; position: relative;
  border-bottom: 1px solid rgba(26,26,20,.22);
}
.carousel-track {
  display: flex; height: 100%;
  
}

.carousel-card {
  min-width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; cursor: pointer;
}

.card-inner {
  width: 100%; padding: 22px 0 10px; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
}

/* Nav sits at top-right corner of the viewport box */
.carousel-nav {
  position: absolute; top: 0; right: 0;
  display: flex; align-items: center; gap: 5px; z-index: 10;
}
.carousel-btn {
  width: 34px; height: 34px;
  border: 1px solid rgba(26,26,20,.2); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #1a1a14; transition: color 0.1s linear;
}
.carousel-btn:hover { background: #1a1a14; color: #e2e2e2; border-color: #1a1a14; }

.card-top { flex: 1; min-height: 0; padding-right: 110px; }

.card-staff-pick {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(26,26,20,.3); margin-bottom: 14px;
}
.card-artist {
  font-size: 13px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: rgba(26,26,20,.45); margin-bottom: 8px;
}
.card-title {
  font-size: 42px; font-weight: 500; line-height: 1.05;
  letter-spacing: -.035em; margin-bottom: 16px; word-break: break-word;
  color: rgba(26,26,20,.88); transition: color 0.1s linear;
}
.card-meta {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.card-format {
  font-size: 11px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; color: rgba(26,26,20,.45);
}
.card-meta-divider {
  width: 1px; height: 10px; background: rgba(26,26,20,.2); flex-shrink: 0;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.card-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: 1px solid rgba(26,26,20,.24);
  padding: 3px 8px; color: rgba(26,26,20,.45);
  cursor: pointer; transition: color 0.1s linear;
}
.card-tag:hover { background: #1a1a14; color: #e2e2e2; border-color: #1a1a14; }

.card-bottom { display: none; }

.carousel-card:hover .card-artist,
.carousel-card:hover .card-title { color: #1a1a14; }

/* ── Table ───────────────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.c-title  { width: auto; }
col.c-genre  { width: 14%; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  padding: 0 12px 10px 0; font-size: 11px; font-weight: 500;
  letter-spacing: .09em; text-transform: uppercase; color: rgba(26,26,20,.48);
  text-align: left; border-bottom: 1px solid rgba(26,26,20,.26); vertical-align: bottom;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }

.tbl tbody tr { cursor: pointer; transition: color 0.1s linear; }
.tbl tbody tr:hover .rec-title, .tbl tbody tr:hover .rec-artist,
.tbl tbody tr:hover .rec-stock { color: #1a1a14; }
.tbl tbody td {
  padding: 14px 12px 14px 0; border-bottom: 1px solid rgba(26,26,20,.12); vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-right: 0; }
.tbl thead th.c-stock { padding-bottom: 8px; padding-right: 0; }

.rec-title { font-size: 15px; font-weight: 500; line-height: 1.25; letter-spacing: -.01em; transition: color 0.1s linear; }
.rec-artist { font-size: 12px; font-weight: 400; color: rgba(26,26,20,.48); margin-top: 3px; line-height: 1.4; transition: color 0.1s linear; }

.genre-tag {
  display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; color: rgba(26,26,20,.48); border: 1px solid rgba(26,26,20,.32);
  padding: 3px 7px; line-height: 1.4; white-space: nowrap; cursor: pointer;
  transition: color 0.1s linear, border-color 0.1s linear;
}
.genre-tag:hover { color: #1a1a14; border-color: #1a1a14; }

.rec-format { font-size: 11px; font-weight: 400; letter-spacing: .05em; text-transform: uppercase; color: rgba(26,26,20,.48); }

.rec-stock {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: #1a1a14; }
.sdot.s { background: rgba(26,26,20,.28); }

.tbl tbody tr.sold .rec-title  { color: rgba(26,26,20,.48); }
.tbl tbody tr.sold .rec-artist { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .genre-tag  { color: rgba(26,26,20,.28); border-color: rgba(26,26,20,.16); }
.tbl tbody tr.sold .rec-format { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .rec-stock  { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .sdot       { background: rgba(26,26,20,.28) !important; }

.sk {
  display: inline-block; height: 9px; border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite;
}
@keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
  col.c-genre { width: auto; }
  .tbl thead th.c-genre { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-genre { text-align: right; padding-right: 0; }
  .carousel-viewport { height: 210px; }
  .card-title  { font-size: 32px; }
  .card-artist { font-size: 11px; }
  .rec-title   { font-size: 14px; }
  .rec-artist  { font-size: 11px; }
}

@media (max-width: 600px) {
  .container    { padding: 94px 20px 80px; }
  .header-inner { padding: 0 20px; }
  .card-inner   { padding: 18px 0 14px; }
  .carousel-nav { right: 0; top: 18px; }
  .carousel-viewport { height: 190px; }
  .card-top     { padding-right: 90px; }
  .card-staff-pick { font-size: 8px; }
  .card-artist     { font-size: 10px; }
  .card-title      { font-size: 20px; letter-spacing: -.02em; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-format     { font-size: 9px; }
  .card-tag        { font-size: 9px; }
  .tbl thead th { font-size: 10px; }
  .rec-title    { font-size: 13px; }
  .rec-artist   { font-size: 11px; }
  .genre-tag    { font-size: 9px; padding: 2px 5px; }
  col.c-format, col.c-stock { display: none; }
  .tbl thead th.c-format, .tbl thead th.c-stock,
  .tbl tbody td.c-format, .tbl tbody td.c-stock { display: none; }
}

</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<div class="container">

  <section class="carousel-section">
    <div class="carousel-viewport">
      <div class="carousel-track" id="carouselTrack">
        <!-- skeleton -->
        <div class="carousel-card" style="cursor:default">
          <div class="card-inner">
            <div class="card-top">
              <div class="sk" style="width:8%;margin-bottom:14px"></div>
              <div class="sk" style="width:14%;margin-bottom:10px"></div>
              <div class="sk" style="width:40%;height:18px;margin-bottom:18px"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- Nav always visible, even before JS loads -->
      <div class="carousel-nav" id="carouselNav">
        <button class="carousel-btn" id="prevBtn">&#8249;</button>
        <button class="carousel-btn" id="nextBtn">&#8250;</button>
      </div>
    </div>
  </section>

  <hr class="section-divider">

  <table class="tbl">
    <colgroup>
      <col class="c-title"><col class="c-genre"><col class="c-format"><col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-title">Title / Artist</th>
        <th class="c-genre">Genre</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="catalogList">
      <tr><td class="c-title"><div class="sk" style="width:55%;margin-bottom:8px"></div><br><div class="sk" style="width:30%"></div></td><td class="c-genre"><div class="sk" style="width:70%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:68%;margin-bottom:8px"></div><br><div class="sk" style="width:38%"></div></td><td class="c-genre"><div class="sk" style="width:60%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:44%;margin-bottom:8px"></div><br><div class="sk" style="width:24%"></div></td><td class="c-genre"><div class="sk" style="width:78%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:60%;margin-bottom:8px"></div><br><div class="sk" style="width:34%"></div></td><td class="c-genre"><div class="sk" style="width:63%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:50%;margin-bottom:8px"></div><br><div class="sk" style="width:28%"></div></td><td class="c-genre"><div class="sk" style="width:72%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
    </tbody>
  </table>

</div>

<script src="script.js"></script>
<script>

function splitPipe(val) {
  return String(val||'').split('||').map(s=>s.trim()).filter(Boolean);
}

function buildCarousel(albums) {
  const featured = albums.filter(a => String(a.featured).toLowerCase() === 'yes').slice(0, 5);
  const cards = featured.length >= 1 ? featured : albums.slice(0, 5);
  const track = document.getElementById('carouselTrack');
  let current = 0;

  // Clear skeleton
  track.innerHTML = '';

  // Build all cards
  cards.forEach((album) => {
    const tags     = splitPipe(album.genre).slice(0, 2);
    const albumUrl = `albums/album.html?id=${album.album_id}`;
    const card     = document.createElement('div');
    card.className = 'carousel-card';
    card.addEventListener('click', () => location.href = albumUrl);
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-top">
          <div class="card-staff-pick">Staff Pick</div>
          <div class="card-artist">${album.artist}</div>
          <div class="card-title">${album.title}</div>
          <div class="card-meta">
            <span class="card-format">${album.format || 'LP'}</span>
            <span class="card-meta-divider"></span>
            <div class="card-tags">${tags.map(t =>
              `<span class="card-tag" onclick="event.stopPropagation();location.href='genre.html?g=${encodeURIComponent(t.toLowerCase())}'">${t}</span>`
            ).join('')}</div>
          </div>
        </div>
      </div>`;
    track.appendChild(card);
  });

  // Nav is already in the HTML — just wire up the buttons
  function goTo(index) {
    if (index < 0) index = cards.length - 1;
    if (index >= cards.length) index = 0;
    current = index;
    track.style.transform = `translateX(-${current * 100}%)`;
  }

  goTo(0);

  document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current - 1); });
  document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); goTo(current + 1); });
}

function buildTable(albums) {
  const sorted = [...albums].sort((a, b) => a.artist.localeCompare(b.artist));
  const tbody = document.getElementById('catalogList');
  tbody.innerHTML = sorted.map(item => {
    const sold   = item.status !== 'available';
    const genre  = splitPipe(item.genre)[0] || '';
    const format = (item.format||'LP').trim();
    return `<tr class="${sold?'sold':''}" onclick="location.href='albums/album.html?id=${item.album_id}'">
      <td class="c-title"><div class="rec-title">${item.title}</div><div class="rec-artist">${item.artist}</div></td>
      <td class="c-genre"><span class="genre-tag" onclick="event.stopPropagation();location.href='genre.html?g=${encodeURIComponent(genre.toLowerCase())}'">${genre}</span></td>
      <td class="c-format"><span class="rec-format">${format}</span></td>
      <td class="c-stock"><div class="rec-stock"><span class="sdot ${sold?'s':'a'}"></span><span>${sold?'Sold':'Avail'}</span></div></td>
    </tr>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const catalog = await LR.api.catalog();
    buildCarousel(catalog);
    buildTable(catalog);
  } catch(e) {
    document.getElementById('carouselTrack').innerHTML = '';
    document.getElementById('catalogList').innerHTML =
      `<tr><td colspan="4" style="padding:40px 0;font-size:13px;color:rgba(26,26,20,.48)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

</script>
</body>
</html>

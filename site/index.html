<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Late Records</title>
<meta name="description" content="Curated vinyl records. Rare, used, and hard to find.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:     #0a0a0a;
  --white:     #f5f3ef;
  --gray-1:    #e8e5df;
  --gray-2:    #c8c4bc;
  --gray-3:    #888078;
  --accent:    #c8b97a;
  --available: #4a7c59;
  --border:    rgba(10,10,10,0.12);
  --header-h:  64px;
  --footer-h:  40px;
  --max-w:     1200px;
  --pad-h:     30px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}a{color:inherit}button{cursor:pointer;font-family:inherit}
.site-header{position:fixed;top:0;left:0;width:100%;z-index:100;background:var(--white);border-bottom:1px solid var(--border);height:var(--header-h)}
.header-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--pad-h);height:100%;display:flex;align-items:center;justify-content:space-between}
.site-name{display:flex;align-items:center;text-decoration:none}
.site-logo{height:38px;width:auto;display:block}
.header-right{display:flex;align-items:center;gap:16px}
.cart-btn{font-family:inherit;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--black);text-decoration:none;border:1px solid var(--black);padding:6px 12px;background:transparent;transition:all .15s}
.cart-btn:hover{background:var(--black);color:var(--white)}
.site-footer{position:fixed;bottom:0;left:0;width:100%;background:var(--white);border-top:1px solid var(--border);height:var(--footer-h);z-index:100}
.footer-inner{max-width:var(--max-w);margin:0 auto;padding:0 var(--pad-h);height:100%;display:flex;align-items:center;justify-content:space-between;font-size:10px;letter-spacing:.06em;color:var(--gray-3)}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--gray-3);text-decoration:none;text-transform:uppercase;font-size:10px;letter-spacing:.08em;transition:color .15s}
.footer-links a:hover{color:var(--black)}
.container{max-width:var(--max-w);margin:0 auto;padding:calc(var(--header-h) + 10px) var(--pad-h) calc(var(--footer-h) + 48px)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gray-2)}
.status-dot.available{background:var(--available)}
.status-dot.sold-out{background:var(--gray-2)}
.skeleton{background:linear-gradient(90deg,var(--gray-1) 25%,var(--white) 50%,var(--gray-1) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.page-divider{border-bottom:1px solid var(--black)}
.featured-strip{border:1px solid var(--black);border-top:none;display:grid;grid-template-columns:45% 55%;transition:opacity .22s}
.featured-strip.fading{opacity:0}
.featured-img-wrap{position:relative;overflow:hidden;background:var(--gray-1);min-height:280px}
.featured-img{width:100%;height:100%;object-fit:cover;display:block}
.featured-info{padding:24px 28px;display:flex;flex-direction:column;justify-content:space-between;border-left:1px solid var(--black);min-height:280px}
.featured-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.featured-eyebrow{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.carousel-nav{display:flex;gap:6px}
.carousel-btn{background:none;border:1px solid var(--border);width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--gray-3);transition:all .15s;cursor:pointer;line-height:1}
.carousel-btn:hover{border-color:var(--black);color:var(--black)}
.featured-title{font-size:clamp(18px,2.2vw,28px);font-weight:700;letter-spacing:-.01em;line-height:1.1}
.featured-artist{font-size:11px;color:var(--gray-3);margin-top:5px;text-transform:uppercase;letter-spacing:.06em}
.featured-desc{font-size:12px;color:var(--gray-3);line-height:1.6;margin-top:12px;max-width:340px;display:none}
.featured-bottom{display:flex;align-items:center;justify-content:flex-end;margin-top:20px}
.featured-link{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--black);text-decoration:none;border-bottom:1px solid var(--black);padding-bottom:1px;transition:opacity .15s}
.featured-link:hover{opacity:.5}
.featured-viewmore{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-3);display:none}
.catalog-header{display:grid;grid-template-columns:1fr 180px 90px 90px;padding:6px 0;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-3)}
.catalog-list{list-style:none}
.catalog-row{display:grid;grid-template-columns:1fr 180px 90px 90px;border-bottom:1px solid var(--border);align-items:center;text-decoration:none;color:var(--black);transition:background .1s;cursor:pointer;padding:2px 0;position:relative}
.catalog-row:hover{background:var(--gray-1)}
.catalog-row.sold-out{opacity:.5}
.col-title{padding:13px 16px 13px 0}
.col-title-main{font-size:13px;font-weight:600;line-height:1.25;max-width:480px;word-break:break-word;hyphens:auto}
.col-title-artist{font-size:10px;color:var(--gray-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;max-width:380px;word-break:break-word}
.col-genre{font-size:10px;color:var(--gray-3);padding-right:12px;line-height:1.6}
.genre-tag{display:inline;color:var(--gray-3);font-size:10px}
.col-format{font-size:10px;color:var(--gray-3);text-transform:uppercase;letter-spacing:.03em}
.col-stock{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.04em;text-transform:uppercase}
.col-stock.available{color:var(--available)}
.col-stock.sold-out{color:var(--gray-2)}
.col-mobile-genre{display:none}
.hover-cover{pointer-events:none;position:fixed;width:160px;height:160px;object-fit:cover;border:1px solid var(--border);opacity:0;transition:opacity .15s;z-index:50;transform:translate(16px,-50%)}
.hover-cover.visible{opacity:1}
.skeleton-row{display:grid;grid-template-columns:1fr 180px 90px 90px;padding:14px 0;border-bottom:1px solid var(--border)}
.sk-cell{height:12px;border-radius:0}
.load-error{padding:40px 0;font-size:12px;color:var(--gray-3)}
@media(max-width:900px){
  .catalog-header,.catalog-row,.skeleton-row{grid-template-columns:1fr 80px}
  .catalog-header .col-genre,.col-genre,.catalog-header .col-format,.col-format,.catalog-header .col-stock,.col-stock{display:none}
  .hover-cover{display:none}
  .col-mobile-genre{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;padding:13px 0}
  .mobile-genre-tag{font-size:9px;letter-spacing:.03em;text-transform:uppercase;color:var(--gray-3);border:1px solid var(--border);padding:2px 5px}
  .featured-viewmore{display:block!important}
}
@media(max-width:600px){
  :root{--pad-h:16px}
  .catalog-header,.catalog-row,.skeleton-row{grid-template-columns:1fr 80px}
  .featured-info{padding:16px;min-height:auto}
  .featured-img-wrap{min-height:0}
  .featured-desc{display:none!important}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-name">
      <img src="/images/late-records-logo.png" alt="Late Records" class="site-logo">
    </a>
    <div class="header-right">
      <span style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-3);display:flex;align-items:center;gap:6px;">
        <span class="status-dot available"></span> Open
      </span>
      <a href="cart.html" class="cart-btn">Cart (<span class="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<img id="hoverCover" class="hover-cover" src="" alt="">

<div class="container">
  <div class="page-divider"></div>

  <div class="featured-strip" id="featuredStrip">
    <div class="featured-img-wrap skeleton" id="featuredImgWrap"></div>
    <div class="featured-info">
      <div>
        <div class="featured-top-row">
          <p class="featured-eyebrow">Staff Pick</p>
          <div class="carousel-nav">
            <button class="carousel-btn" id="prevBtn">&#8249;</button>
            <button class="carousel-btn" id="nextBtn">&#8250;</button>
          </div>
        </div>
        <p class="featured-title skeleton sk-cell" id="featuredTitle" style="width:70%;height:26px;"></p>
        <p class="featured-artist skeleton sk-cell" id="featuredArtist" style="width:45%;height:12px;margin-top:8px;"></p>
        <p class="featured-desc" id="featuredDesc"></p>
      </div>
      <div class="featured-bottom">
        <span class="featured-viewmore" id="featuredViewMore">View More</span>
        <a href="#" class="featured-link" id="featuredLink">View Record &rarr;</a>
      </div>
    </div>
  </div>

  <div class="catalog-header">
    <span>Title / Artist</span>
    <span class="col-genre">Genre</span>
    <span class="col-format">Format</span>
    <span class="col-stock">Stock</span>
  </div>

  <ul class="catalog-list" id="catalogList" aria-live="polite">
    <li class="skeleton-row"><div class="sk-cell skeleton" style="width:60%"></div><div class="sk-cell skeleton" style="width:70%"></div><div class="sk-cell skeleton" style="width:50px"></div><div class="sk-cell skeleton" style="width:60px"></div></li>
    <li class="skeleton-row"><div class="sk-cell skeleton" style="width:75%"></div><div class="sk-cell skeleton" style="width:55%"></div><div class="sk-cell skeleton" style="width:50px"></div><div class="sk-cell skeleton" style="width:60px"></div></li>
    <li class="skeleton-row"><div class="sk-cell skeleton" style="width:50%"></div><div class="sk-cell skeleton" style="width:80%"></div><div class="sk-cell skeleton" style="width:50px"></div><div class="sk-cell skeleton" style="width:60px"></div></li>
  </ul>

  <div class="load-error" id="loadError" style="display:none;">Could not load catalog. Please refresh the page.</div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span></span>
    <div class="footer-links">
      <a href="https://instagram.com" target="_blank" rel="noopener">Instagram &#8599;</a>
    </div>
  </div>
</footer>

<script>
const LR=(()=>{
  const API_BASE='https://late-records.shop';
  const api={
    async catalog(){const r=await fetch(`${API_BASE}/api/catalog`);if(!r.ok)throw new Error();return r.json()},
    async album(id){const r=await fetch(`${API_BASE}/api/album?id=${encodeURIComponent(id)}`);if(r.status===404)return null;if(!r.ok)throw new Error();return r.json()},
    async order(p){const r=await fetch(`${API_BASE}/api/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});return r.json()}
  };
  const CART_KEY='lr_cart';
  const cart={
    get(){try{return JSON.parse(localStorage.getItem(CART_KEY))||[]}catch{return[]}},
    save(i){localStorage.setItem(CART_KEY,JSON.stringify(i));cart._emit()},
    add(item){const i=cart.get();const e=i.find(x=>x.id===item.id);if(e){if(e.qty<(item.stock||1))e.qty++}else i.push({...item,qty:1});cart.save(i)},
    remove(id){cart.save(cart.get().filter(i=>i.id!==id))},
    updateQty(id,d){const i=cart.get();const e=i.find(x=>x.id===id);if(!e)return;e.qty=Math.max(1,Math.min(e.qty+d,e.stock||99));cart.save(i)},
    clear(){localStorage.removeItem(CART_KEY);cart._emit()},
    count(){return cart.get().reduce((n,i)=>n+i.qty,0)},
    subtotal(){return cart.get().reduce((n,i)=>n+i.price*i.qty,0)},
    shipping(){const q=cart.count();return q<=2?250:q<=5?350:450},
    total(){return cart.subtotal()+cart.shipping()},
    _emit(){window.dispatchEvent(new CustomEvent('lr:cart:updated'))}
  };
  const ui={
    syncCartBadge(){document.querySelectorAll('.cart-count').forEach(e=>{e.textContent=cart.count()})},
    peso(n){return '\u20b1'+Number(n).toLocaleString('en-PH')},
    modal(el,o){if(el)el.classList.toggle('open',o)}
  };
  window.addEventListener('lr:cart:updated',()=>ui.syncCartBadge());
  document.addEventListener('DOMContentLoaded',()=>{
    ui.syncCartBadge();
    document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(el=>el.classList.remove('open'))});
  });
  return{api,cart,ui};
})();
</script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  const listEl=document.getElementById('catalogList');
  const errorEl=document.getElementById('loadError');
  const hoverImg=document.getElementById('hoverCover');
  let catalog=[],carouselItems=[],carouselIdx=0;

  try{catalog=await LR.api.catalog()}catch(e){listEl.innerHTML='';errorEl.style.display='block';return}

  const available=catalog.filter(a=>a.status==='available');
  carouselItems=available.slice(0,5);

  function renderFeatured(album){
    if(!album)return;
    const imgWrap=document.getElementById('featuredImgWrap');
    const titleEl=document.getElementById('featuredTitle');
    const artistEl=document.getElementById('featuredArtist');
    const descEl=document.getElementById('featuredDesc');
    const linkEl=document.getElementById('featuredLink');
    imgWrap.className='featured-img-wrap';
    imgWrap.innerHTML=`<img src="/images/${album.album_id}.jpg" alt="${album.title}" class="featured-img" onerror="this.parentElement.style.background='var(--gray-1)'">`;
    titleEl.textContent=album.title;titleEl.className='featured-title';titleEl.style='';
    artistEl.textContent=album.artist;artistEl.className='featured-artist';artistEl.style='';
    const desc=(album.description||'').split(/[.!?]/)[0].trim();
    if(desc){descEl.textContent=desc+'.';descEl.style.display='block'}else{descEl.style.display='none'}
    linkEl.href=`/albums/album.html?id=${album.album_id}`;
  }

  if(carouselItems.length)renderFeatured(carouselItems[0]);

  function goTo(idx){
    if(!carouselItems.length)return;
    carouselIdx=((idx%carouselItems.length)+carouselItems.length)%carouselItems.length;
    const strip=document.getElementById('featuredStrip');
    strip.classList.add('fading');
    setTimeout(()=>{renderFeatured(carouselItems[carouselIdx]);strip.classList.remove('fading')},220);
  }

  document.getElementById('prevBtn').addEventListener('click',()=>goTo(carouselIdx-1));
  document.getElementById('nextBtn').addEventListener('click',()=>goTo(carouselIdx+1));

  listEl.innerHTML='';
  catalog.forEach(album=>{
    const isSold=album.status!=='available';
    const genres=(album.genre||'').split('||').map(g=>g.trim()).filter(Boolean).slice(0,2);
    const li=document.createElement('li');
    li.innerHTML=`
      <a href="/albums/album.html?id=${album.album_id}" class="catalog-row${isSold?' sold-out':''}" data-id="${album.album_id}">
        <div class="col-title">
          <div class="col-title-main">${album.title}</div>
          <div class="col-title-artist">${album.artist}</div>
        </div>
        <div class="col-genre">${genres.map(g=>`[${g}]`).join(' ')}</div>
        <div class="col-mobile-genre">${genres.map(g=>`<span class="mobile-genre-tag">${g}</span>`).join('')}</div>
        <div class="col-format">Vinyl LP</div>
        <div class="col-stock ${isSold?'sold-out':'available'}">
          <span class="status-dot ${isSold?'sold-out':'available'}"></span>
          ${isSold?'Sold Out':'Available'}
        </div>
      </a>`;
    listEl.appendChild(li);
  });

  listEl.addEventListener('mouseover',e=>{const r=e.target.closest('.catalog-row');if(!r)return;hoverImg.src=`/images/${r.dataset.id}.jpg`;hoverImg.classList.add('visible')});
  listEl.addEventListener('mouseout',e=>{if(!e.target.closest('.catalog-row'))return;hoverImg.classList.remove('visible')});
  document.addEventListener('mousemove',e=>{hoverImg.style.left=e.clientX+'px';hoverImg.style.top=e.clientY+'px'});
});
</script>
</body>
</html>

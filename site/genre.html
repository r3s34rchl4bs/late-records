<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.classList.toggle('dark', localStorage.getItem('lr_theme') === 'dark')</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genre — LATE RECORDS</title>
<link rel="stylesheet" href="fonts/inter.css">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  --bg:         #e2e2e2;
  --bg-dot:     rgba(0,0,0,.08);
  --ink:        #1a1a14;
  --ink55:      rgba(26,26,20,.55);
  --ink45:      rgba(26,26,20,.45);
  --ink30:      rgba(26,26,20,.30);
  --ink15:      rgba(26,26,20,.15);
  --border:     rgba(26,26,20,.22);
  --border-mid: rgba(26,26,20,.12);
  --btn-bg:     #1a1a14;
  --btn-fg:     #e2e2e2;
  --footer-bg:  rgba(226,226,226,.92);
  --footer-border: rgba(26,26,20,.14);
  --modal-bg:   rgba(233,233,233,.97);
}
html.dark {
  --bg:         #141410;
  --bg-dot:     rgba(255,255,255,.04);
  --ink:        #e8e8df;
  --ink55:      rgba(232,232,223,.55);
  --ink45:      rgba(232,232,223,.42);
  --ink30:      rgba(232,232,223,.26);
  --ink15:      rgba(232,232,223,.12);
  --border:     rgba(232,232,223,.18);
  --border-mid: rgba(232,232,223,.1);
  --btn-bg:     #e8e8df;
  --btn-fg:     #141410;
  --footer-bg:  rgba(20,20,16,.92);
  --footer-border: rgba(232,232,223,.1);
  --modal-bg:   rgba(22,22,18,.97);
}

html.no-transitions * { transition: none !important; }

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: var(--bg);
  z-index: 1000;
  border-bottom: 1px solid var(--border);
  height: 74px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.logo-dark            { display: none; }
html.dark .logo-light { display: none; }
html.dark .logo-dark  { display: block; }
.header-right { display: flex; align-items: center; gap: 16px; }
.theme-toggle {
  background: none; border: none; padding: 4px;
  color: var(--ink); cursor: pointer;
  transition: opacity .15s; flex-shrink: 0;
}
.theme-toggle:hover { opacity: .6; }
.theme-toggle .icon-sun,
.theme-toggle .icon-moon { width: 18px; height: 18px; display: block; }
html:not(.dark) .theme-toggle .icon-moon { display: none; }
html.dark .theme-toggle .icon-sun { display: none; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: var(--ink);
}
.cart-link:hover { color: var(--ink55); }

.container {
  max-width: 1200px; margin: 0 auto; padding: 84px 30px 104px;
}

.genre-nav-label {
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink45);
  margin-bottom: 10px; display: block;
}

.genre-nav-block {
  position: relative; margin-bottom: 10px;
}

.genre-pills-shell {
  position: relative; overflow: hidden;
  transition: max-height .18s ease;
  padding-right: 26px;
}

.genre-pills {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}

.genre-pill {
  font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; border: 1px solid var(--ink30);
  padding: 3px 7px; color: var(--ink45); cursor: pointer;
  transition: color 0.1s linear; text-decoration: none;
  display: inline-block; line-height: 1.4;
}
.genre-pill:hover { color: var(--ink); border-color: var(--ink); }
.genre-pill.active { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }

.genre-nav-toggle {
  position: absolute; right: 0; bottom: 0;
  background: var(--ink15); border: 0;
  width: 18px; height: 18px;
  display: none; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink); cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif; font-weight: 400; line-height: 1; z-index: 2;
}
.genre-nav-toggle.is-visible { display: inline-flex; }

.section-divider { display: none; }

.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.c-title  { width: auto; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  position: sticky; top: 74px; z-index: 30;
  background-color: var(--bg);
  box-shadow: 0 -1px 0 var(--border), 0 1px 0 var(--ink30);
  padding: 10px 12px 10px 0; font-size: 11px; font-weight: 500;
  letter-spacing: .09em; text-transform: uppercase; color: var(--ink45);
  text-align: left; vertical-align: bottom;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }

.tbl tbody tr { cursor: pointer; transition: color 0.1s linear; }
.tbl tbody tr:hover .rec-title,
.tbl tbody tr:hover .rec-artist { color: var(--ink); }

.tbl tbody td {
  padding: 14px 12px 14px 0;
  border-bottom: 1px solid var(--border-mid); vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-right: 0; }

.rec-title { font-size: 14px; font-weight: 400; line-height: 1.25; letter-spacing: -.01em; transition: color 0.1s linear; }
.rec-artist { font-size: 12px; font-weight: 400; color: var(--ink45); margin-top: 3px; line-height: 1.4; transition: color 0.1s linear; }
.rec-format { font-size: 11px; font-weight: 400; letter-spacing: .05em; text-transform: uppercase; color: var(--ink45); }
.rec-stock { display: flex; align-items: center; justify-content: flex-end; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: var(--ink); }
.sdot.s { background: var(--ink30); }

.tbl tbody tr.sold .rec-title  { color: var(--ink30); }
.tbl tbody tr.sold .rec-artist { color: var(--ink30); }
.tbl tbody tr.sold .rec-format { color: var(--ink30); }
.tbl tbody tr.sold .rec-stock  { color: var(--ink30); }
.tbl tbody tr.sold .sdot       { background: var(--ink30) !important; }

.empty-state { padding: 60px 0; font-size: 13px; color: var(--ink30); letter-spacing: .02em; }

.sk {
  display: inline-block; height: 9px; border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%; animation: sh 1.4s infinite;
}
html.dark .sk {
  background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.05) 75%);
  background-size: 200% 100%;
}
@keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

@media (max-width: 900px) {
  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format, .tbl tbody td.c-format { text-align: right; padding-right: 0; }
  .rec-title { font-size: 13px; }
}

@media (max-width: 600px) {
  .container { padding: 84px 20px 98px; }
  .header-inner { padding: 0 20px; }
  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format, .tbl tbody td.c-format { text-align: right; padding-right: 0; }
  .tbl thead th { top: 74px; font-size: 10px; }
  .rec-title { font-size: 13px; }
  .genre-pill { font-size: 9px; padding: 2px 6px; }
  .guide-footer-inner { padding: 0 20px; }
}

.guide-footer {
  position: fixed; left: 0; right: 0; bottom: 0; height: 34px;
  background: var(--footer-bg); border-top: 1px solid var(--footer-border);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 9998;
}
.guide-footer-inner {
  max-width: 1200px; height: 100%; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: flex-end;
}
.guide-btn {
  background: transparent; color: var(--ink55);
  font-family: 'Inter', system-ui, sans-serif; font-size: 9px; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase; padding: 0; border: none;
  cursor: pointer; user-select: none; display: inline-flex; align-items: center;
  border-radius: 0; opacity: .72; transition: opacity .12s linear, color .12s linear;
}
.guide-btn:hover { opacity: 1; color: var(--ink); }
.guide-btn-inner { display: inline-flex; align-items: center; gap: 4px; }
.guide-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.guide-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.18);
  backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
  display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
}
.guide-modal.is-open { display: flex; }
.guide-modal-inner {
  background: var(--modal-bg); border: 1px solid var(--border);
  width: 100%; max-width: 390px; font-family: 'Inter', system-ui, sans-serif;
  position: relative; box-shadow: 0 14px 36px rgba(0,0,0,.1);
}
.guide-modal-body { padding: 16px 20px; }
.guide-heading-wrap { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border-mid); }
.guide-subheading { font-size: 10px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--ink30); }
.guide-row { display: grid; grid-template-columns: 56px 1fr 22px; gap: 12px; align-items: start; padding: 12px 0; border-bottom: 1px solid var(--border-mid); }
.guide-row:last-child { border-bottom: none; }
.guide-format { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--ink); }
.guide-desc { font-size: 12px; font-weight: 400; color: var(--ink55); line-height: 1.45; }
.guide-index { text-align: right; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink15); }

</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo logo-light" alt="LATE RECORDS">
      <img src="images/late-records-logo-dark.png" class="header-logo logo-dark" alt="LATE RECORDS">
    </a>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93"  y1="4.93"  x2="7.05"  y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95"/>
          <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<div class="container">

  <span class="genre-nav-label">Browse</span>
  <div class="genre-nav-block">
    <div class="genre-pills-shell" id="genreNavShell">
      <div class="genre-pills" id="genreNav"></div>
    </div>
    <button class="genre-nav-toggle" id="genreNavToggle" type="button" aria-expanded="false">+</button>
  </div>

  <table class="tbl">
    <colgroup>
      <col class="c-title">
      <col class="c-format">
      <col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-title">Title / Artist</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="genreList">
      <tr><td class="c-title"><div class="sk" style="width:55%;margin-bottom:8px"></div><br><div class="sk" style="width:30%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:68%;margin-bottom:8px"></div><br><div class="sk" style="width:38%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:44%;margin-bottom:8px"></div><br><div class="sk" style="width:24%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
    </tbody>
  </table>

</div>

<div class="guide-footer">
  <div class="guide-footer-inner">
    <button class="guide-btn" id="guideBtn" type="button">
      <span class="guide-btn-inner">
  <span>Guide</span>
</span>
    </button>
  </div>
</div>

<div class="guide-modal" id="guideModal">
  <div class="guide-modal-inner">
    <div class="guide-modal-body">
      <div class="guide-heading-wrap">
        <div class="guide-subheading">Standard types</div>
      </div>
      <div class="guide-row"><span class="guide-format">LP</span><span class="guide-desc">Full-length album, usually 12"</span><span class="guide-index">01</span></div>
      <div class="guide-row"><span class="guide-format">2xLP</span><span class="guide-desc">Double album, two 12" records</span><span class="guide-index">02</span></div>
      <div class="guide-row"><span class="guide-format">3xLP</span><span class="guide-desc">Triple album, three 12" records</span><span class="guide-index">03</span></div>
      <div class="guide-row"><span class="guide-format">12"</span><span class="guide-desc">12-inch single, EP, or extended cut</span><span class="guide-index">04</span></div>
      <div class="guide-row"><span class="guide-format">10"</span><span class="guide-desc">10-inch EP or special pressing</span><span class="guide-index">05</span></div>
      <div class="guide-row"><span class="guide-format">7"</span><span class="guide-desc">7-inch single</span><span class="guide-index">06</span></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const params      = new URLSearchParams(window.location.search);
const activeGenre = (params.get('g') || '').toLowerCase();

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const catalog = await LR.api.catalog();

    const allGenres = [...new Set(
      catalog.flatMap(a => LR.ui.splitPipe(a.genre).map(g => g.toLowerCase()))
    )].sort();

    const shell  = document.getElementById('genreNavShell');
    const pills  = document.getElementById('genreNav');
    const toggle = document.getElementById('genreNavToggle');

    let isExpanded = false;
    let windowedGenres = allGenres;

    function getMaxRows() {
      return window.innerWidth <= 600 ? 8 : 6;
    }

    function getRowsForGenres(genreList) {
      pills.innerHTML = '';
      genreList.forEach(g => {
        const pill = document.createElement('a');
        pill.className = 'genre-pill' + (g === activeGenre ? ' active' : '');
        pill.href = `genre.html?g=${encodeURIComponent(g)}`;
        pill.textContent = g.replace(/\b\w/g, c => c.toUpperCase());
        pills.appendChild(pill);
      });

      const items = [...pills.children];
      if (!items.length) return [];
      const rows = [];
      items.forEach((item, idx) => {
        const top    = item.offsetTop;
        const bottom = top + item.offsetHeight;
        const last   = rows[rows.length - 1];
        if (!last || Math.abs(last.top - top) > 1) {
          rows.push({ top, bottom, startIdx: idx, endIdx: idx });
        } else {
          last.bottom  = Math.max(last.bottom, bottom);
          last.endIdx  = idx;
        }
      });
      return rows;
    }

    function computeWindowedGenres() {
      const maxRows   = getMaxRows();
      const rows      = getRowsForGenres(allGenres);
      const activeIdx = allGenres.indexOf(activeGenre);

      if (rows.length <= maxRows) return allGenres;

      const activeRow = rows.findIndex(r => activeIdx >= r.startIdx && activeIdx <= r.endIdx);
      if (activeRow === -1) return allGenres.slice(0, rows[maxRows - 1].endIdx + 1);

      const half      = Math.floor(maxRows / 2);
      let startRow    = activeRow - half;
      let endRow      = activeRow + (maxRows - half - 1);

      if (startRow < 0) { endRow += Math.abs(startRow); startRow = 0; }
      if (endRow >= rows.length) { startRow -= (endRow - rows.length + 1); endRow = rows.length - 1; }
      startRow = Math.max(0, startRow);
      endRow   = Math.min(rows.length - 1, endRow);

      const startGenreIdx = rows[startRow].startIdx;
      const endGenreIdx   = rows[endRow].endIdx;
      return allGenres.slice(startGenreIdx, endGenreIdx + 1);
    }

    function buildPills(genreList) {
      pills.innerHTML = '';
      genreList.forEach(g => {
        const pill = document.createElement('a');
        pill.className = 'genre-pill' + (g === activeGenre ? ' active' : '');
        pill.href = `genre.html?g=${encodeURIComponent(g)}`;
        pill.textContent = g.replace(/\b\w/g, c => c.toUpperCase());
        pills.appendChild(pill);
      });
    }

    function getCollapsedHeight(genreList) {
      const rows = getRowsForGenres(genreList);
      const maxRows = getMaxRows();
      if (rows.length <= maxRows) return null;
      return rows[maxRows - 1].bottom;
    }

    function applyState() {
      if (isExpanded) {
        buildPills(allGenres);
        shell.style.maxHeight = pills.scrollHeight + 'px';
        toggle.classList.add('is-visible');
        toggle.textContent = '−';
        toggle.setAttribute('aria-expanded', 'true');
      } else {
        windowedGenres = computeWindowedGenres();
        buildPills(windowedGenres);
        const hasMore = allGenres.length > windowedGenres.length;
        if (!hasMore) {
          shell.style.maxHeight = pills.scrollHeight + 'px';
          toggle.classList.remove('is-visible');
          toggle.setAttribute('aria-expanded', 'true');
        } else {
          shell.style.maxHeight = pills.scrollHeight + 'px';
          toggle.classList.add('is-visible');
          toggle.textContent = '+';
          toggle.setAttribute('aria-expanded', 'false');
        }
      }
    }

    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      isExpanded = !isExpanded;
      applyState();
    });

    window.addEventListener('resize', () => requestAnimationFrame(applyState));

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => requestAnimationFrame(applyState));
    } else {
      requestAnimationFrame(() => requestAnimationFrame(applyState));
    }

    if (activeGenre) {
      document.title = `${activeGenre.replace(/\b\w/g, c => c.toUpperCase())} — LATE RECORDS`;
    }

    const filtered = catalog
      .filter(a => LR.ui.splitPipe(a.genre).some(g => g.toLowerCase() === activeGenre))
      .sort((a, b) => a.artist.localeCompare(b.artist));

    const tbody = document.getElementById('genreList');

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="3" class="empty-state">No records found for this genre.</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(item => {
        const sold   = item.status !== 'available';
        const format = (item.format || 'LP').trim();
        return `
          <tr class="${sold ? 'sold' : ''}" onclick="location.href='albums/album.html?id=${item.album_id}'">
            <td class="c-title">
              <div class="rec-title">${item.title}</div>
              <div class="rec-artist">${item.artist}</div>
            </td>
            <td class="c-format"><span class="rec-format">${format}</span></td>
            <td class="c-stock">
              <div class="rec-stock">
                <span class="sdot ${sold ? 's' : 'a'}"></span>
                <span>${sold ? 'Sold' : 'Avail'}</span>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

  } catch (e) {
    document.getElementById('genreList').innerHTML =
      `<tr><td colspan="3" style="padding:40px 0;font-size:13px;color:rgba(26,26,20,.48)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const guideBtn   = document.getElementById('guideBtn');
  const guideModal = document.getElementById('guideModal');
  if (!guideBtn || !guideModal) return;
  guideBtn.addEventListener('click', () => { guideModal.classList.add('is-open'); });
  guideModal.addEventListener('click', e => {
    if (e.target === guideModal) guideModal.classList.remove('is-open');
  });
});
</script>

</body>
</html>

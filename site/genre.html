<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient — LATE RECORDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  color: #1a1a14;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* ── Header ──────────────────────────────────────────────── */
.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%;
  background-color: #e2e2e2;
  background-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  z-index: 1000;
  border-bottom: 1px solid rgba(26,26,20,.22);
  height: 74px;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.cart-link {
  font-size: 11px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; color: #1a1a14;
}
.cart-link:hover { color: rgba(26,26,20,.5); }

/* ── Container ───────────────────────────────────────────── */
.container {
  max-width: 1200px; margin: 0 auto; padding: 110px 30px 80px;
}

/* ── Genre pills ─────────────────────────────────────────── */
.genre-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 0;
}

/* ── Genre nav ───────────────────────────────────────────── */
.genre-nav-label {
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: rgba(26,26,20,.48);
  margin-bottom: 10px; display: block;
}

.genre-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.genre-pill {
  font-size: 10px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; border: 1px solid rgba(26,26,20,.32);
  padding: 3px 7px; color: rgba(26,26,20,.48);
  cursor: pointer; transition: all .15s; text-decoration: none;
  display: inline-block; line-height: 1.4;
}
.genre-pill:hover { color: #1a1a14; border-color: #1a1a14; }
.genre-pill.active { background: #1a1a14; color: #e2e2e2; border-color: #1a1a14; }

/* ── Divider ─────────────────────────────────────────────── */
.section-divider {
  border: none;
  border-top: 1px solid rgba(26,26,20,.1);
  margin: 24px 0;
}

/* ── Table ───────────────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }

col.c-title  { width: auto; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  padding: 0 12px 10px 0;
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; color: rgba(26,26,20,.48);
  text-align: left; border-bottom: 1px solid rgba(26,26,20,.26);
  vertical-align: bottom;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock { text-align: right; padding-right: 0; }

.tbl tbody tr { cursor: pointer; transition: color .15s; }
.tbl tbody tr:hover .rec-title, .tbl tbody tr:hover .rec-artist,
.tbl tbody tr:hover .rec-stock { color: #1a1a14; }

.tbl tbody td {
  padding: 14px 12px 14px 0;
  border-bottom: 1px solid rgba(26,26,20,.12);
  vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock { padding-top: 8px; padding-bottom: 8px; padding-left: 0; padding-right: 0; }
.tbl thead th.c-stock { padding-bottom: 8px; padding-left: 0; padding-right: 0; }

.rec-title {
  font-size: 14px; font-weight: 400;
  line-height: 1.25; letter-spacing: -.01em; transition: color .15s;
}
.rec-artist {
  font-size: 12px; font-weight: 400;
  color: rgba(26,26,20,.48); margin-top: 3px; line-height: 1.4; transition: color .15s;
}
.rec-format {
  font-size: 11px; font-weight: 400; letter-spacing: .05em;
  text-transform: uppercase; color: rgba(26,26,20,.48);
}
.rec-stock {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 6px; font-size: 11px; font-weight: 500;
  letter-spacing: .06em; text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: #1a1a14; }
.sdot.s { background: rgba(26,26,20,.28); }

/* sold-out dimming */
.tbl tbody tr.sold .rec-title  { color: rgba(26,26,20,.4); }
.tbl tbody tr.sold .rec-artist { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .rec-format { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .rec-stock  { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .sdot       { background: rgba(26,26,20,.28) !important; }

/* ── Empty state ─────────────────────────────────────────── */
.empty-state {
  padding: 60px 0; font-size: 13px;
  color: rgba(26,26,20,.38); letter-spacing: .02em;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-format { text-align: right; padding-right: 0; }
  .rec-title  { font-size: 13px; }
}

@media (max-width: 600px) {
  .container    { padding: 94px 20px 80px; }
  .header-inner { padding: 0 20px; }
  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format { text-align: right; padding-right: 0; }
  .tbl tbody  td.c-format { text-align: right; padding-right: 0; }
  .rec-title    { font-size: 13px; }
  .tbl thead th { font-size: 10px; }
  .genre-pill   { font-size: 9px; padding: 2px 6px; }
}

</style>
</head>
<body>

<!-- HEADER -->
<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<div class="container">

  <!-- Genre nav -->
  <div class="genre-nav-wrap">
    <span class="genre-nav-label">Browse</span>
    <div class="genre-pills" id="genreNav"></div>
  </div>

  <hr class="section-divider">

  <!-- Table — same structure as index -->
  <table class="tbl">
    <colgroup>
      <col class="c-title">
      <col class="c-format">
      <col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-title">Title / Artist</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="genreList"></tbody>
  </table>

</div>

<script>

// Mock catalog — replace with LR.api.catalog() in production
const CATALOG = [
  { album_id:"selected-ambient-works-85-92-by-aphex-twin",  title:"Selected Ambient Works 85–92", artist:"Aphex Twin",                         genre:"Ambient||Electronic", format:"2×LP", price:2300, status:"available" },
  { album_id:"self-titled-by-guilherme-coutinho",           title:"Self-Titled",                  artist:"Guilherme Coutinho e o Grupo Stalo", genre:"MPB||Ambient",        format:"LP",   price:2500, status:"available" },
  { album_id:"introduction-by-witch",                       title:"Introduction",                  artist:"Witch",                              genre:"Psychedelic||African Rock", format:"LP", price:3200, status:"available" },
  { album_id:"my-favorite-things-by-john-coltrane",        title:"My Favorite Things",            artist:"John Coltrane",                      genre:"Jazz||Modal",          format:"LP",   price:1800, status:"available" },
  { album_id:"disco-jazz-by-rupa",                          title:"Disco Jazz",                    artist:"Rupa",                               genre:"Disco||Bollywood",     format:"LP",   price:4500, status:"sold_out"  },
  { album_id:"i-feel-the-rhythm-by-ron-trent",              title:"I Feel The Rhythm",             artist:"Ron Trent",                          genre:"Deep House||Chicago",  format:"12\"", price:1200, status:"available" },
  { album_id:"reprise-by-a-naoito",                         title:"Reprise",                       artist:"A. Naoito",                          genre:"Ambient||Minimal",     format:"LP",   price:1600, status:"available" },
  { album_id:"long-title-test-1",  title:"The Disintegration Loops: A Study in Decay and Gradual Erasure", artist:"William Basinski & The Arcana Ensemble", genre:"Ambient||Drone", format:"4×LP", price:5800, status:"available" },
  { album_id:"long-title-test-2",  title:"Music for Airports and Other Transitional Spaces", artist:"Obscure Recording Artists Collective of the Late 1970s", genre:"Ambient||Electronic", format:"2×LP", price:3400, status:"sold_out" }
];

function splitPipe(val) {
  return String(val||'').split('||').map(s=>s.trim()).filter(Boolean);
}

// Get current genre from URL
const params      = new URLSearchParams(window.location.search);
const activeGenre = (params.get('g') || 'ambient').toLowerCase();

// Build all unique genres from catalog dynamically
const allGenres = [...new Set(
  CATALOG.flatMap(a => splitPipe(a.genre).map(g => g.toLowerCase()))
)].sort();

// Render genre pills — no All Records
const nav = document.getElementById('genreNav');

allGenres.forEach(g => {
  const pill = document.createElement('a');
  pill.className = 'genre-pill' + (g === activeGenre ? ' active' : '');
  pill.href = `genre.html?g=${encodeURIComponent(g)}`;
  pill.textContent = g.replace(/\b\w/g, c => c.toUpperCase());
  nav.appendChild(pill);
});

// Filter and render table
const filtered = CATALOG.filter(a =>
  splitPipe(a.genre).some(g => g.toLowerCase() === activeGenre)
);

document.title = `${activeGenre.replace(/\b\w/g, c => c.toUpperCase())} — LATE RECORDS`;

const sorted = [...filtered].sort((a, b) => a.artist.localeCompare(b.artist));
const tbody = document.getElementById('genreList');

if (!sorted.length) {
  tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No records found for this genre.</td></tr>`;
} else {
  tbody.innerHTML = sorted.map(item => {
    const sold = item.status !== 'available';
    return `
      <tr class="${sold?'sold':''}" onclick="location.href='albums/album.html?id=${item.album_id}'">
        <td class="c-title">
          <div class="rec-title">${item.title}</div>
          <div class="rec-artist">${item.artist}</div>
        </td>
        <td class="c-format"><span class="rec-format">${item.format||'LP'}</span></td>
        <td class="c-stock">
          <div class="rec-stock">
            <span class="sdot ${sold?'s':'a'}"></span>
            <span>${sold?'Sold':'Avail'}</span>
          </div>
        </td>
      </tr>`;
  }).join('');
}

</script>
</body>
</html>

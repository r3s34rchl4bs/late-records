<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genre — LATE RECORDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --header-height: 74px;
  --site-bg: #e2e2e2;
  --site-bg-image: radial-gradient(circle, rgba(0,0,0,.08) 0.5px, transparent 0.5px);
  --site-bg-size: 3px 3px;
}

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--site-bg);
  background-image: var(--site-bg-image);
  background-size: var(--site-bg-size);
  color: #1a1a14;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* ── Header ──────────────────────────────────────────────── */
.fixed-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background-color: var(--site-bg);
  background-image: var(--site-bg-image);
  background-size: var(--site-bg-size);
  z-index: 1000;
  border-bottom: 1px solid rgba(26,26,20,.22);
  height: var(--header-height);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
}
.header-logo { height: 44px; display: block; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.cart-link {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: #1a1a14;
}
.cart-link:hover { color: rgba(26,26,20,.5); }

/* ── Container ───────────────────────────────────────────── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 84px 30px 104px;
}

/* ── Genre nav ───────────────────────────────────────────── */
.genre-nav-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: rgba(26,26,20,.48);
  margin-bottom: 10px;
  display: block;
}

.genre-nav-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  min-width: 0;
}

.genre-pills-wrap {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}

.genre-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  max-height: 24px;
  overflow: hidden;
}

.genre-pills.is-expanded {
  max-height: none;
}

.genre-pill {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  border: 1px solid rgba(26,26,20,.32);
  padding: 3px 7px;
  color: rgba(26,26,20,.48);
  cursor: pointer;
  transition: color 0.1s linear;
  text-decoration: none;
  display: inline-block;
  line-height: 1.4;
  flex-shrink: 0;
}
.genre-pill:hover { color: #1a1a14; border-color: #1a1a14; }
.genre-pill.active {
  background: #1a1a14;
  color: #e2e2e2;
  border-color: #1a1a14;
}

.genre-nav-toggle {
  background: rgba(26,26,20,.18);
  border: 0;
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #1a1a14;
  cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 400;
  line-height: 1;
  flex-shrink: 0;
}

/* ── Divider ─────────────────────────────────────────────── */
.section-divider {
  border: none;
  border-top: 1px solid rgba(26,26,20,.1);
  margin: 24px 0;
}

/* ── Table ───────────────────────────────────────────────── */
.tbl {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

col.c-title  { width: auto; }
col.c-format { width: 8%; }
col.c-stock  { width: 8%; }

.tbl thead th {
  position: sticky;
  top: 74px;
  z-index: 30;
  background-color: var(--site-bg);
  background-image: var(--site-bg-image);
  background-size: var(--site-bg-size);
  box-shadow: 0 -1px 0 rgba(26,26,20,.22), 0 1px 0 rgba(26,26,20,.26);
  padding: 10px 12px 10px 0;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: rgba(26,26,20,.48);
  text-align: left;
  vertical-align: bottom;
}
.tbl thead th:first-child { padding-left: 0; }
.tbl thead th.c-stock {
  text-align: right;
  padding-right: 0;
}

.tbl tbody tr {
  cursor: pointer;
  transition: color 0.1s linear;
}
.tbl tbody tr:hover .rec-title,
.tbl tbody tr:hover .rec-artist { color: #1a1a14; }

.tbl tbody td {
  padding: 14px 12px 14px 0;
  border-bottom: 1px solid rgba(26,26,20,.12);
  vertical-align: middle;
}
.tbl tbody td:first-child { padding-left: 0; }
.tbl tbody td:last-child  { padding-right: 0; }
.tbl tbody td.c-stock {
  padding-top: 8px;
  padding-bottom: 8px;
  padding-right: 0;
}

.rec-title {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.25;
  letter-spacing: -.01em;
  transition: color 0.1s linear;
}
.rec-artist {
  font-size: 12px;
  font-weight: 400;
  color: rgba(26,26,20,.48);
  margin-top: 3px;
  line-height: 1.4;
  transition: color 0.1s linear;
}
.rec-format {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: rgba(26,26,20,.48);
}
.rec-stock {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sdot.a { background: #1a1a14; }
.sdot.s { background: rgba(26,26,20,.28); }

/* sold-out dimming */
.tbl tbody tr.sold .rec-title  { color: rgba(26,26,20,.4); }
.tbl tbody tr.sold .rec-artist { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .rec-format { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .rec-stock  { color: rgba(26,26,20,.28); }
.tbl tbody tr.sold .sdot       { background: rgba(26,26,20,.28) !important; }

/* ── Empty state ─────────────────────────────────────────── */
.empty-state {
  padding: 60px 0;
  font-size: 13px;
  color: rgba(26,26,20,.38);
  letter-spacing: .02em;
}

/* ── Skeleton ────────────────────────────────────────────── */
.sk {
  display: inline-block;
  height: 9px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.13) 50%, rgba(0,0,0,.07) 75%);
  background-size: 200% 100%;
  animation: sh 1.4s infinite;
}
@keyframes sh {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format,
  .tbl tbody td.c-format {
    text-align: right;
    padding-right: 0;
  }
  .rec-title { font-size: 13px; }
}

@media (max-width: 600px) {
  .container { padding: 84px 20px 98px; }
  .header-inner { padding: 0 20px; }

  col.c-stock { display: none; }
  .tbl thead th.c-stock, .tbl tbody td.c-stock { display: none; }
  col.c-format { width: 22%; }
  .tbl thead th.c-format,
  .tbl tbody td.c-format {
    text-align: right;
    padding-right: 0;
  }

  .tbl thead th {
    top: 74px;
    font-size: 10px;
  }

  .rec-title { font-size: 13px; }
  .genre-pill { font-size: 9px; padding: 2px 6px; }

  .guide-footer-inner { padding: 0 20px; }
}

/* ── Guide footer + modal ────────────────────────────────── */
.guide-footer {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 34px;
  background: rgba(226,226,226,.92);
  border-top: 1px solid rgba(26,26,20,.14);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 9998;
}

.guide-footer-inner {
  max-width: 1200px;
  height: 100%;
  margin: 0 auto;
  padding: 0 30px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.guide-btn {
  background: transparent;
  color: rgba(26,26,20,.58);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: lowercase;
  padding: 0;
  border: none;
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  border-radius: 0;
  opacity: .72;
  transition: opacity .12s linear, color .12s linear;
}
.guide-btn:hover {
  opacity: 1;
  color: rgba(26,26,20,.82);
}
.guide-btn-inner {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.guide-btn svg {
  width: 14px;
  height: 14px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.25;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

.guide-modal {
  position: fixed;
  inset: 0;
  background: rgba(226,226,226,.14);
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(1px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.guide-modal.is-open { display: flex; }

.guide-modal-inner {
  background: rgba(233,233,233,.97);
  border: 1px solid rgba(26,26,20,.35);
  width: 100%;
  max-width: 390px;
  font-family: 'Inter', system-ui, sans-serif;
  position: relative;
  box-shadow: 0 14px 36px rgba(26,26,20,.08);
}

.guide-modal-body {
  padding: 16px 20px 16px;
}

.guide-heading-wrap {
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(26,26,20,.12);
}

.guide-subheading {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(26,26,20,.34);
}

.guide-row {
  display: grid;
  grid-template-columns: 56px 1fr 22px;
  gap: 12px;
  align-items: start;
  padding: 12px 0;
  border-bottom: 1px solid rgba(26,26,20,.1);
}
.guide-row:last-child { border-bottom: none; }

.guide-format {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  color: rgba(26,26,20,.85);
}

.guide-desc {
  font-size: 12px;
  font-weight: 400;
  color: rgba(26,26,20,.56);
  line-height: 1.45;
}

.guide-index {
  text-align: right;
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(26,26,20,.22);
}
</style>
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="index.html">
      <img src="images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<div class="container">

  <span class="genre-nav-label">Browse</span>
  <div class="genre-nav-row">
    <div class="genre-pills-wrap">
      <div class="genre-pills" id="genreNav"></div>
    </div>
    <button class="genre-nav-toggle" id="genreNavToggle" type="button" aria-expanded="true">−</button>
  </div>

  <hr class="section-divider">

  <table class="tbl">
    <colgroup>
      <col class="c-title">
      <col class="c-format">
      <col class="c-stock">
    </colgroup>
    <thead>
      <tr>
        <th class="c-title">Title / Artist</th>
        <th class="c-format">Format</th>
        <th class="c-stock">Stock</th>
      </tr>
    </thead>
    <tbody id="genreList">
      <tr><td class="c-title"><div class="sk" style="width:55%;margin-bottom:8px"></div><br><div class="sk" style="width:30%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:68%;margin-bottom:8px"></div><br><div class="sk" style="width:38%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
      <tr><td class="c-title"><div class="sk" style="width:44%;margin-bottom:8px"></div><br><div class="sk" style="width:24%"></div></td><td class="c-format"><div class="sk" style="width:55%"></div></td><td class="c-stock"><div class="sk" style="width:68%;float:right"></div></td></tr>
    </tbody>
  </table>

</div>

<!-- Guide footer -->
<div class="guide-footer">
  <div class="guide-footer-inner">
    <button class="guide-btn" id="guideBtn" type="button">
      <span class="guide-btn-inner">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 3.75h7l3 3v13.5H7z"/>
          <path d="M14 3.75v3h3"/>
        </svg>
        <span>guide</span>
      </span>
    </button>
  </div>
</div>

<!-- Guide modal -->
<div class="guide-modal" id="guideModal">
  <div class="guide-modal-inner">
    <div class="guide-modal-body">
      <div class="guide-heading-wrap">
        <div class="guide-subheading">Standard types</div>
      </div>

      <div class="guide-row">
        <span class="guide-format">LP</span>
        <span class="guide-desc">Full-length album, usually 12"</span>
        <span class="guide-index">01</span>
      </div>
      <div class="guide-row">
        <span class="guide-format">2xLP</span>
        <span class="guide-desc">Double album, two 12" records</span>
        <span class="guide-index">02</span>
      </div>
      <div class="guide-row">
        <span class="guide-format">3xLP</span>
        <span class="guide-desc">Triple album, three 12" records</span>
        <span class="guide-index">03</span>
      </div>
      <div class="guide-row">
        <span class="guide-format">12"</span>
        <span class="guide-desc">12-inch single, EP, or extended cut</span>
        <span class="guide-index">04</span>
      </div>
      <div class="guide-row">
        <span class="guide-format">10"</span>
        <span class="guide-desc">10-inch EP or special pressing</span>
        <span class="guide-index">05</span>
      </div>
      <div class="guide-row">
        <span class="guide-format">7"</span>
        <span class="guide-desc">7-inch single</span>
        <span class="guide-index">06</span>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const params      = new URLSearchParams(window.location.search);
const activeGenre = (params.get('g') || '').toLowerCase();

document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('genreNavToggle');
  const pills  = document.getElementById('genreNav');

  if (toggle && pills) {
    toggle.textContent = '+';
    toggle.setAttribute('aria-expanded', 'false');

    toggle.addEventListener('click', () => {
      const expanded = pills.classList.toggle('is-expanded');
      toggle.textContent = expanded ? '−' : '+';
      toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    });
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const catalog = await LR.api.catalog();

    const allGenres = [...new Set(
      catalog.flatMap(a => LR.ui.splitPipe(a.genre).map(g => g.toLowerCase()))
    )].sort();

    const nav = document.getElementById('genreNav');
    allGenres.forEach(g => {
      const pill = document.createElement('a');
      pill.className = 'genre-pill' + (g === activeGenre ? ' active' : '');
      pill.href = `genre.html?g=${encodeURIComponent(g)}`;
      pill.textContent = g.replace(/\b\w/g, c => c.toUpperCase());
      nav.appendChild(pill);
    });

    if (activeGenre) {
      document.title = `${activeGenre.replace(/\b\w/g, c => c.toUpperCase())} — LATE RECORDS`;
    }

    const filtered = catalog
      .filter(a => LR.ui.splitPipe(a.genre).some(g => g.toLowerCase() === activeGenre))
      .sort((a, b) => a.artist.localeCompare(b.artist));

    const tbody = document.getElementById('genreList');

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="3" class="empty-state">No records found for this genre.</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(item => {
        const sold   = item.status !== 'available';
        const format = (item.format || 'LP').trim();
        return `
          <tr class="${sold ? 'sold' : ''}" onclick="location.href='albums/album.html?id=${item.album_id}'">
            <td class="c-title">
              <div class="rec-title">${item.title}</div>
              <div class="rec-artist">${item.artist}</div>
            </td>
            <td class="c-format"><span class="rec-format">${format}</span></td>
            <td class="c-stock">
              <div class="rec-stock">
                <span class="sdot ${sold ? 's' : 'a'}"></span>
                <span>${sold ? 'Sold' : 'Avail'}</span>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

  } catch (e) {
    document.getElementById('genreList').innerHTML =
      `<tr><td colspan="3" style="padding:40px 0;font-size:13px;color:rgba(26,26,20,.48)">Could not load catalog. Please refresh.</td></tr>`;
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const guideBtn = document.getElementById('guideBtn');
  const guideModal = document.getElementById('guideModal');

  if (!guideBtn || !guideModal) return;

  guideBtn.addEventListener('click', () => {
    guideModal.classList.add('is-open');
  });

  guideModal.addEventListener('click', e => {
    if (e.target === guideModal) {
      guideModal.classList.remove('is-open');
    }
  });
});
</script>
<script src="under-construction.js"></script>
</body>
</html>

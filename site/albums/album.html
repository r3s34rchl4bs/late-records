<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="fixed-header">
  <div class="header-inner">
    <a href="../index.html">
      <img src="../images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="../cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<div class="container" id="mainContainer"></div>

<script src="../script.js"></script>
<script>

const ALBUM_ID = new URLSearchParams(location.search).get('id') || '';

function renderNotFound() {
  document.getElementById('mainContainer').innerHTML = `
    <div style="padding:80px 0;text-align:center;">
      <h2>Album not found</h2>
      <a href="../index.html">← Back to shop</a>
    </div>
  `;
}

function renderAlbum(item, all) {
  const sold = item.status !== 'available';
  const tracks = item.tracklist ? item.tracklist.split('||').map(t => t.trim()) : [];

  document.getElementById('mainContainer').innerHTML = `
    <div class="album-page">
      
      <!-- IMAGE -->
      <div class="album-image-wrap">
        <img 
          src="/images/${item.album_id}.jpg" 
          class="album-image" 
          alt="${item.title}"
          onerror="this.style.display='none';document.getElementById('albumPlaceholder').style.display='flex';"
        >
        <div id="albumPlaceholder" class="album-placeholder" style="display:none;">
          <span>Image Pending</span>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="album-details">
        <div>
          <h1 class="album-title">${item.title}</h1>
          <p class="album-artist">by ${item.artist}</p>

          <div class="album-genre-tags">
            <span class="album-format-label">${item.format || 'LP'}</span>
            ${item.genre.split('||').slice(0,2).map(g =>
              `<span class="album-genre-tag">${g.trim()}</span>`
            ).join('')}
          </div>
        </div>

        <!-- PRICE -->
        <div class="price-block">
          <div class="price-label">Price</div>
          <div class="album-price">
            ${sold ? 'Sold Out' : `₱${Number(item.price).toLocaleString()}`}
          </div>

          <button class="add-to-cart-btn" ${sold ? 'disabled' : ''}>
            ${sold ? 'Sold Out' : 'Add to Cart'}
          </button>
        </div>

        <!-- DESCRIPTION -->
        ${item.description ? `
          <p class="description">${item.description}</p>
        ` : ''}

        <!-- TRACKLIST -->
        ${tracks.length ? `
          <div class="tracklist-block">
            <p>Tracklist</p>
            <ul>
              ${tracks.map(t => `<li>${t}</li>`).join('')}
            </ul>
          </div>
        ` : ''}

      </div>
    </div>
  `;
}

(async () => {
  if (!ALBUM_ID) return renderNotFound();

  try {
    const album = await LR.api.album(ALBUM_ID);
    if (!album) return renderNotFound();

    const all = await LR.api.catalog().catch(() => []);
    renderAlbum(album, all);
  } catch {
    renderNotFound();
  }
})();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.classList.toggle('dark', localStorage.getItem('lr_theme') === 'dark')</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records.">
<link rel="stylesheet" href="../fonts/inter.css">
<link rel="stylesheet" href="../style.css">
<style>

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, var(--bg-dot) 0.5px, transparent 0.5px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
.header-logo       { height: 44px; filter: none; }
.header-logo:hover { opacity: .5; transition: opacity .15s; }
.cart-link {
  border: none; padding: 0; background: none;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: .07em; text-transform: uppercase; color: var(--ink);
}
.cart-link:hover { background: none; color: var(--ink55); }
.fixed-footer { display: none; }
.container { padding-bottom: 80px; padding-top: calc(74px + 30px); }
@media (max-width: 900px) {
  .container { padding-top: calc(74px + 10px); }
}

.album-page {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}
.album-image-wrap {
  width: 52%;
  flex-shrink: 0;
  position: sticky;
  top: calc(74px + 20px);
}
.album-image {
  width: 100%; aspect-ratio: 1/1;
  object-fit: cover; display: block;
}
.album-placeholder {
  width: 100%; aspect-ratio: 1/1;
  background: var(--art-bg);
  display: flex; align-items: center; justify-content: center;
}
.album-placeholder-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}
.placeholder-vinyl {
  width: 80px; height: 80px; opacity: .4;
  animation: spin 8s linear infinite;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.placeholder-label {
  font-size: 9px; font-weight: 500; letter-spacing: .14em;
  text-transform: uppercase; color: var(--ink45);
}
.album-details {
  flex: 1;
  display: flex; flex-direction: column; gap: 20px;
  min-width: 0;
}

.album-title  { font-size: 28px; font-weight: 600; line-height: 1.12; margin: 0; color: var(--ink); letter-spacing: -.02em; }
.album-artist { font-size: 16px; font-weight: 400; color: var(--ink55); margin: 0; }
.album-genre-tags { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.album-format-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink45); }
.album-meta-divider { width: 1px; height: 10px; background: var(--ink30); flex-shrink: 0; }
.album-genre-tag {
  font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; border: 1px solid var(--border-tag);
  padding: 3px 8px; color: var(--ink45);
  cursor: pointer; transition: color 0.1s linear, background 0.1s linear;
  text-decoration: none; display: inline-block;
}
.album-genre-tag:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }

.price-block {
  border-top: 1px dashed var(--ink30);
  padding-top: 12px;
  position: relative;
}
.price-label {
  font-size: 9px; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--ink45);
  margin-bottom: 8px; font-family: 'Inter', system-ui, sans-serif;
}
.album-price {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 20px; font-weight: 400; color: var(--ink);
  letter-spacing: .02em; margin-bottom: 18px;
}
.add-to-cart-btn {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: .09em;
  text-transform: uppercase; padding: 10px 20px;
  border: 1px solid var(--btn-bg); background: var(--btn-bg);
  color: var(--btn-fg); cursor: pointer; transition: opacity .15s;
  width: 100%;
}
.add-to-cart-btn:hover    { opacity: .82; }
.add-to-cart-btn:disabled { opacity: .35; cursor: not-allowed; }

.description {
  font-size: 14px; line-height: 1.7; font-weight: 400;
  margin: 0; color: var(--ink55);
}
.description.is-collapsed {
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.description-toggle {
  background: var(--ink15); border: 0;
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--ink); cursor: pointer;
  font-family: 'Inter', system-ui, sans-serif; font-weight: 400;
  vertical-align: middle; margin-left: 6px; flex-shrink: 0;
}

.audio-block { display: none; flex-direction: column; gap: 0; }
.audio-block.is-visible { display: flex; }

.audio-row {
  display: flex; align-items: center; gap: 12px;
}
.audio-sample-label {
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink45); font-weight: 500; min-width: 60px;
}
.audio-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.audio-arrow {
  background: none; border: none;
  font-size: 18px; line-height: 1; padding: 2px 6px;
  cursor: pointer; color: var(--ink55); transition: color 0.1s linear;
}
.audio-arrow:hover { color: var(--ink); }
.audio-arrow:disabled { opacity: .25; cursor: not-allowed; }
.audio-arrow:disabled:hover { color: var(--ink55); }

.audio-controls {
  display: flex; align-items: center; gap: 10px; margin-top: 8px;
}
.audio-play-btn {
  width: 28px; height: 28px; border: 1px solid var(--ink30);
  background: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.1s linear;
  color: var(--ink); padding: 0;
}
.audio-play-btn:hover { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
.audio-play-btn svg { width: 10px; height: 10px; fill: currentColor; }

.audio-progress-wrap {
  flex: 1; height: 2px; background: var(--ink15); cursor: pointer; position: relative;
}
.audio-progress-bar {
  height: 100%; background: var(--ink); width: 0%; transition: width 0.1s linear;
  pointer-events: none;
}
.audio-time {
  font-size: 10px; color: var(--ink45); letter-spacing: .03em;
  white-space: nowrap; min-width: 70px; text-align: right;
}

.tracklist-block { display: flex; flex-direction: column; gap: 10px; }
.block-heading {
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink45); font-weight: 500;
}
.tracklist { list-style: none; padding: 0; margin: 0; }
.tracklist li {
  font-size: 13px; line-height: 1.5; padding: 6px 0;
  border-bottom: 1px solid var(--ink15);
  font-weight: 400; color: var(--ink55);
}

.related-section { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border-mid); }
.related-title {
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink45); margin: 0 0 16px; font-weight: 500;
}
.related-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
}
.related-card { display: block; text-decoration: none; color: var(--ink); }
.related-cover {
  width: 100%; aspect-ratio: 1/1; object-fit: cover;
  display: block; transition: opacity .2s;
}
.related-card:hover .related-cover { opacity: .72; }
.related-placeholder {
  width: 100%; aspect-ratio: 1/1;
  background: var(--art-bg);
  align-items: center; justify-content: center;
}
.related-info  { margin-top: 8px; }
.related-name  { font-size: 12px; font-weight: 600; line-height: 1.25; margin: 0; word-break: break-word; }
.related-artist{
  font-size: 11px; color: var(--ink45); margin-top: 2px;
}

@media (max-width: 900px) {
  .album-page { flex-direction: column; gap: 22px; }
  .album-image-wrap { width: 100%; position: static; }
  .related-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
}
@media (max-width: 600px) {
  .album-title  { font-size: 22px; }
  .album-artist { font-size: 14px; }
}

/* ── Cart Toast ──────────────────────────────────────────── */
.cart-toast-container {
  position: fixed;
  top: calc(74px + 14px);
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px;
  padding: 0 20px;
  z-index: 1500;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  pointer-events: none;
  box-sizing: border-box;
}
.cart-toast {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  background: #1a1a14;
  color: #e2e2e2;
  padding: 12px 16px;
  max-width: 320px;
  border: 1px solid rgba(226,226,226,.25);
  opacity: 0;
  transition: none;
}
.cart-toast.is-visible {
  opacity: 1;
}
.cart-toast.is-leaving {
  opacity: 0;
  transition: opacity .1s steps(3);
}
.cart-toast.is-duplicate {
  background: #252520;
  border: 1px dashed rgba(226,226,226,.2);
}
.cart-toast.is-duplicate .cart-toast-label {
  color: rgba(226,226,226,.45);
}
.cart-toast.is-duplicate .cart-toast-title,
.cart-toast.is-duplicate .cart-toast-artist {
  color: rgba(226,226,226,.45);
}
.cart-toast.is-duplicate .cart-toast-img {
  opacity: .5;
}
.cart-toast-checkout {
  flex-shrink: 0;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #e2e2e2;
  text-decoration: none;
  padding: 6px 10px;
  border: 1px solid rgba(226,226,226,.25);
}
.cart-toast-checkout:hover {
  background: rgba(226,226,226,.1);
}
.cart-toast-img {
  width: 40px;
  height: 40px;
  object-fit: cover;
  flex-shrink: 0;
}
.cart-toast-img-placeholder {
  width: 40px;
  height: 40px;
  background: rgba(226,226,226,.1);
  flex-shrink: 0;
}
.cart-toast-text {
  flex: 1;
  min-width: 0;
}
.cart-toast-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(226,226,226,.5);
  margin-bottom: 3px;
}
.cart-toast-title {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cart-toast-artist {
  font-size: 11px;
  color: rgba(226,226,226,.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
@media (max-width: 600px) {
  .cart-toast-container {
    top: auto;
    bottom: 16px;
    left: 0;
    right: 0;
    transform: none;
    padding: 0 12px;
    max-width: none;
    align-items: stretch;
  }
  .cart-toast {
    max-width: none;
  }
}

</style>
</head>
<body>

<div class="cart-toast-container" id="toastContainer" aria-live="polite" aria-atomic="false"></div>

<header class="fixed-header">
  <div class="header-inner">
    <a href="../index.html">
      <img src="../images/late-records-logo.png" class="header-logo logo-light" alt="LATE RECORDS">
      <img src="../images/late-records-logo-dark.png" class="header-logo logo-dark" alt="LATE RECORDS">
    </a>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93"  y1="4.93"  x2="7.05"  y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95"/>
          <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="../cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
    </div>
  </div>
</header>

<div class="container" id="mainContainer"></div>

<script src="../script.js"></script>
<script>

const ALBUM_ID   = new URLSearchParams(location.search).get('id') || '';
const AUDIO_BASE = '../audio/';

function _escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderNotFound() {
  document.getElementById('mainContainer').innerHTML = `
    <div style="padding:80px 0;text-align:center;">
      <h2 style="font-size:22px;margin:0 0 12px;color:#1a1a14;">Album not found</h2>
      <p style="color:rgba(26,26,20,.5);margin:0 0 24px;font-size:13px;">We couldn't find that record.</p>
      <a href="../index.html" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-decoration:underline;color:#1a1a14;">← Back to shop</a>
    </div>
  `;
}

function scoreRelated(cur, cand) {
  let s = 0;
  const cg = LR.ui.splitPipe(cur.genre);
  const cc = LR.ui.splitPipe(cur.context);
  const tg = LR.ui.splitPipe(cand.genre);
  const tc = LR.ui.splitPipe(cand.context);
  tg.forEach(t => { if (cg.includes(t)) s += 4; });
  tc.forEach(t => { if (cc.includes(t)) s += 2; });
  if (cur.artist === cand.artist) s += 6;
  if ((cur.format || 'LP') === (cand.format || 'LP')) s += 2;
  if (cand.status === 'available') s += 1;
  else s -= 5;
  return s;
}

function renderAlbum(item, all) {
  const sold           = item.status !== 'available';
  const tracks         = LR.ui.splitPipe(item.tracklist);
  const visibleTracks  = tracks.slice(0, 4);
  const hiddenTracks   = tracks.slice(4);
  const related = all
    .filter(i => i.album_id !== item.album_id)
    .map(i => ({ i, s: scoreRelated(item, i) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 4);

  document.title = item.title + ' by ' + item.artist;
const favLink = document.querySelector("link[rel*='icon']") || document.createElement('link');
favLink.type = 'image/png';
favLink.rel  = 'shortcut icon';
favLink.href = '/images/' + item.album_id + '.jpg';
document.head.appendChild(favLink);

  document.getElementById('mainContainer').innerHTML = `
    <div class="album-page">
      <div class="album-image-wrap">
        <img src="/images/${encodeURIComponent(item.album_id)}.jpg" class="album-image" id="albumImg" alt="${_escHTML(item.title)}"
          onerror="this.style.display='none';document.getElementById('albumPlaceholder').style.display='flex';">
        <div id="albumPlaceholder" class="album-placeholder" style="display:none;">
          <div class="album-placeholder-inner">
            <svg viewBox="0 0 80 80" class="placeholder-vinyl" xmlns="http://www.w3.org/2000/svg">
              <circle cx="40" cy="40" r="38" fill="none" stroke="rgba(26,26,20,.15)" stroke-width="1"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
              <circle cx="40" cy="40" r="22" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
              <circle cx="40" cy="40" r="14" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
              <circle cx="40" cy="40" r="6" fill="none" stroke="rgba(26,26,20,.2)" stroke-width="1"/>
              <circle cx="40" cy="40" r="2.5" fill="rgba(26,26,20,.25)"/>
            </svg>
            <span class="placeholder-label">Image Pending</span>
          </div>
        </div>
      </div>
      <div class="album-details">
        <div>
          <h1 class="album-title">${_escHTML(item.title)}</h1>
          <p class="album-artist">by ${_escHTML(item.artist)}</p>
         <div class="album-genre-tags">
          <span class="album-format-label">${_escHTML((item.format || 'LP').trim())}</span>

          ${item.condition ? `
            <span class="album-meta-divider"></span>
            <span class="album-format-label">${_escHTML(item.condition)}</span>
          ` : ''}

          ${LR.ui.splitPipe(item.genre).length ? `
            <span class="album-meta-divider"></span>
          ` : ''}

          ${LR.ui.splitPipe(item.genre).slice(0, 3).map(g =>
            `<a class="album-genre-tag" href="../genre.html?g=${encodeURIComponent(g.toLowerCase())}">${_escHTML(g)}</a>`
          ).join('')}
        </div>
        </div>
        <div class="price-block">
          <div class="price-label">Price</div>
          <div class="album-price">${sold
            ? `<span style="color:rgba(26,26,20,.3);text-decoration:line-through;">${LR.ui.peso(item.price)}</span>`
            : LR.ui.peso(item.price)}</div>
          <button class="add-to-cart-btn" id="addToCartBtn"
            data-id="${_escHTML(item.album_id)}" data-title="${_escHTML(item.title)}"
            data-artist="${_escHTML(item.artist)}" data-price="${item.price}"
            data-stock="${item.stock}" ${sold ? 'disabled' : ''}>
            ${sold ? 'Sold Out' : 'Add to Cart'}
          </button>
        </div>
        ${item.description ? `
        <div class="description-block">
          <div style="display:flex;align-items:flex-end;gap:0;">
            <p class="description" id="albumDesc" style="flex:1;">${_escHTML(item.description)}</p>
            <button class="description-toggle" id="descToggle" style="display:none;">+</button>
          </div>
        </div>` : ''}
        <div class="audio-block" id="audioBlock">
          <div class="audio-row">
            <span class="audio-sample-label" id="audioLabel">Sample 1</span>
            <div class="audio-nav">
              <button class="audio-arrow" id="audioPrev">‹</button>
              <button class="audio-arrow" id="audioNext">›</button>
            </div>
          </div>
          <div class="audio-controls">
            <button class="audio-play-btn" id="audioPlayBtn">
              <svg id="audioPlayIcon" viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
            </button>
            <div class="audio-progress-wrap" id="audioProgressWrap">
              <div class="audio-progress-bar" id="audioProgressBar"></div>
            </div>
            <span class="audio-time" id="audioTime">0:00 / 0:00</span>
          </div>
          <audio id="albumAudio" preload="none" style="display:none;"></audio>
        </div>
        ${tracks.length ? `
        <div class="tracklist-block">
          <p class="block-heading">Tracklist</p>
          <div style="display:flex;align-items:flex-end;gap:0;">
            <div style="flex:1;">
              <ul class="tracklist">
                ${visibleTracks.map(t => `<li>${_escHTML(t)}</li>`).join('')}
              </ul>
              ${hiddenTracks.length ? `
              <ul class="tracklist" id="tracklistHidden" style="display:none;">
                ${hiddenTracks.map(t => `<li>${_escHTML(t)}</li>`).join('')}
              </ul>` : ''}
            </div>
            ${hiddenTracks.length ? `
            <button class="description-toggle" id="tracklistToggle">+</button>` : ''}
          </div>
        </div>` : ''}
      </div>
    </div>
    ${related.length ? `
    <section class="related-section">
      <h3 class="related-title">Recommended</h3>
      <div class="related-grid">
        ${related.map(({ i }) => `
          <a class="related-card" href="album.html?id=${encodeURIComponent(i.album_id)}">
            <img src="/images/${encodeURIComponent(i.album_id)}.jpg" class="related-cover" alt="${_escHTML(i.title)}" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="related-placeholder" style="display:none;">
              <div class="album-placeholder-inner">
                <svg viewBox="0 0 80 80" class="placeholder-vinyl" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="40" cy="40" r="38" fill="none" stroke="rgba(26,26,20,.15)" stroke-width="1"/>
                  <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
                  <circle cx="40" cy="40" r="22" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
                  <circle cx="40" cy="40" r="14" fill="none" stroke="rgba(26,26,20,.1)" stroke-width="1"/>
                  <circle cx="40" cy="40" r="6" fill="none" stroke="rgba(26,26,20,.2)" stroke-width="1"/>
                  <circle cx="40" cy="40" r="2.5" fill="rgba(26,26,20,.25)"/>
                </svg>
                <span class="placeholder-label">Image Pending</span>
              </div>
            </div>
            <div class="related-info">
              <p class="related-name">${_escHTML(i.title)}</p>
              <p class="related-artist">${_escHTML(i.artist)}</p>
            </div>
          </a>
        `).join('')}
      </div>
    </section>` : ''}
  `;

  setupDescToggle();
  setupTracklist();
  setupAudio(item.album_id);
  setupAddToCart(item);
}

function setupDescToggle() {
  const desc   = document.getElementById('albumDesc');
  const toggle = document.getElementById('descToggle');
  if (!desc || !toggle) return;
  requestAnimationFrame(() => {
    if (desc.scrollHeight > 100) {
      desc.classList.add('is-collapsed');
      toggle.style.display = 'inline-flex';
      toggle.textContent   = '+';
    }
  });
  toggle.addEventListener('click', () => {
    const c = desc.classList.toggle('is-collapsed');
    toggle.textContent = c ? '+' : '−';
  });
}

function setupTracklist() {
  const hidden = document.getElementById('tracklistHidden');
  const toggle = document.getElementById('tracklistToggle');
  if (!hidden || !toggle) return;
  toggle.addEventListener('click', () => {
    const isHidden = hidden.style.display === 'none';
    hidden.style.display = isHidden ? 'block' : 'none';
    toggle.textContent   = isHidden ? '−' : '+';
  });
}

function setupAudio(albumId) {
  const block    = document.getElementById('audioBlock');
  const audio    = document.getElementById('albumAudio');
  const label    = document.getElementById('audioLabel');
  const prev     = document.getElementById('audioPrev');
  const next     = document.getElementById('audioNext');
  const playBtn  = document.getElementById('audioPlayBtn');
  const playIcon = document.getElementById('audioPlayIcon');
  const progWrap = document.getElementById('audioProgressWrap');
  const progBar  = document.getElementById('audioProgressBar');
  const timeEl   = document.getElementById('audioTime');
  if (!block || !audio) return;

  const valid = []; let cur = 0;
  const PLAY_ICON  = '<polygon points="2,1 9,5 2,9"/>';
  const PAUSE_ICON = '<rect x="1.5" y="1" width="3" height="8"/><rect x="5.5" y="1" width="3" height="8"/>';

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function setTrack(i) {
    cur = i;
    const wasPlaying = !audio.paused;
    audio.src = valid[i];
    label.textContent = `Sample ${i + 1}`;
    prev.disabled = i === 0;
    next.disabled = i === valid.length - 1;
    progBar.style.width = '0%';
    timeEl.textContent = '0:00 / 0:00';
    playIcon.innerHTML = PLAY_ICON;
    if (wasPlaying) audio.play();
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progBar.style.width = pct + '%';
    timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  });

  audio.addEventListener('ended', () => {
    playIcon.innerHTML = PLAY_ICON;
    progBar.style.width = '0%';
  });

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playIcon.innerHTML = PAUSE_ICON;
    } else {
      audio.pause();
      playIcon.innerHTML = PLAY_ICON;
    }
  });

  progWrap.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progWrap.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  prev.addEventListener('click', () => { if (cur > 0) setTrack(cur - 1); });
  next.addEventListener('click', () => { if (cur < valid.length - 1) setTrack(cur + 1); });

  function probeOne(url) {
    return new Promise(resolve => {
      const a = new Audio(); a.preload = 'metadata';
      a.addEventListener('loadedmetadata', () => resolve(url), { once: true });
      a.addEventListener('error', () => resolve(null), { once: true });
      a.src = url;
    });
  }

  const probes = [1, 2, 3, 4, 5].map(i =>
    probeOne(`${AUDIO_BASE}${albumId}/sample${i}.mp3`)
  );
  Promise.all(probes).then(results => {
    results.forEach(url => { if (url) valid.push(url); });
    if (valid.length) { block.classList.add('is-visible'); setTrack(0); }
  });
}

function showCartToast(item, isDuplicate) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'cart-toast' + (isDuplicate ? ' is-duplicate' : '');
  toast.setAttribute('role', 'status');
  const message = isDuplicate ? 'Already in cart' : 'Added to cart';
  toast.innerHTML = `
    <img class="cart-toast-img" src="/images/${encodeURIComponent(item.album_id)}.jpg" alt=""
      onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
    <div class="cart-toast-img-placeholder" style="display:none;"></div>
    <div class="cart-toast-text">
      <div class="cart-toast-label">${_escHTML(message)}</div>
      <div class="cart-toast-title">${_escHTML(item.title)}</div>
      <div class="cart-toast-artist">${_escHTML(item.artist)}</div>
    </div>
    <a href="../checkout.html" class="cart-toast-checkout">Checkout</a>
  `;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('is-visible'));
  setTimeout(() => {
    toast.classList.remove('is-visible');
    toast.classList.add('is-leaving');
    setTimeout(() => toast.remove(), 200);
  }, 2500);
}

function setupAddToCart(item) {
  const btn = document.getElementById('addToCartBtn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const result = LR.cart.add({
      id: item.album_id, title: item.title,
      artist: item.artist, price: item.price, stock: item.stock
    });
    showCartToast(item, result === 'exists');
  });
}

(async () => {
  if (!ALBUM_ID) { renderNotFound(); return; }
  try {
    const all = await LR.api.catalog();
    const album = all.find(a => a.album_id === ALBUM_ID);
    if (!album) { renderNotFound(); return; }
    renderAlbum(album, all);
  } catch (e) {
    renderNotFound();
  }
})();

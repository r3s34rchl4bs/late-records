<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATE RECORDS</title>
<meta name="description" content="Curated vinyl records.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>

/* ── Album page layout ────────────────────────────────────── */

.album-page {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

.album-image-wrap { width: 58%; flex-shrink: 0; }

.album-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #f0f0f0;
}

.album-details {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

.album-title  { font-size: 32px; font-weight: 600; line-height: 1.12; margin: 0; }
.album-artist { font-size: 18px; font-weight: 400; color: #555; margin: 0; }
.album-price  { font-size: 20px; font-weight: 500; }

/* ── Button row ───────────────────────────────────────────── */

.button-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.cart-confirm {
  font-size: 13px;
  opacity: 0;
  transition: opacity .2s;
}
.cart-confirm.show { opacity: 1; }

/* ── Description toggle ───────────────────────────────────── */

.description {
  font-size: 15px;
  line-height: 1.65;
  font-weight: 300;
  margin: 0;
  overflow: hidden;
}

.description.is-collapsed { max-height: 6.4em; }

.description-toggle {
  background: none;
  border: 0;
  padding: 0;
  font-size: 13px;
  color: #000;
  cursor: pointer;
  text-decoration: underline;
}

/* ── Audio player ─────────────────────────────────────────── */

.audio-block { display: none; flex-direction: column; gap: 8px; }
.audio-block.is-visible { display: flex; }

.audio-shell {
  border: 1px solid rgba(0,0,0,.08);
  padding: 12px;
}

.audio-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.audio-label { font-size: 13px; color: #444; }

.audio-nav { display: flex; align-items: center; gap: 8px; }

.audio-arrow {
  background: none;
  border: 1px solid rgba(0,0,0,.15);
  padding: 4px 10px;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  color: #000;
  font-weight: 600;
}

.audio-arrow:disabled { opacity: .3; cursor: not-allowed; }

audio { width: 100%; }

/* ── Tracklist ────────────────────────────────────────────── */

.tracklist-block { display: flex; flex-direction: column; gap: 10px; }

.block-heading {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(0,0,0,.5);
  font-weight: 400;
}

.tracklist {
  list-style: none;
  padding: 0;
  margin: 0;
}

@media (min-width: 901px) {
  .tracklist { column-count: 2; column-gap: 22px; }
}

.tracklist li {
  font-size: 14px;
  line-height: 1.5;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,0,0,.05);
  font-weight: 300;
  color: rgba(0,0,0,.65);
  break-inside: avoid;
}

/* ── Related ──────────────────────────────────────────────── */

.related-section { margin-top: 48px; }

.related-title {
  font-size: 12px;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: #777;
  margin: 0 0 16px;
}

.related-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

.related-card { display: block; text-decoration: none; color: #000; }

.related-cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: #f0f0f0;
}

.related-info  { margin-top: 8px; }
.related-name  { font-size: 13px; font-weight: 600; line-height: 1.25; margin: 0; word-break: break-word; }
.related-artist{ font-size: 11px; color: #555; margin-top: 2px; }

/* ── Responsive ───────────────────────────────────────────── */

@media (max-width: 900px) {
  .album-page { flex-direction: column; gap: 24px; }
  .album-image-wrap { width: 100%; }
  .related-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
}

@media (max-width: 600px) {
  .album-title  { font-size: 26px; }
  .album-artist { font-size: 16px; }
  .related-grid { gap: 14px; }
}

</style>
</head>
<body>

<!-- HEADER -->
<header class="fixed-header">
  <div class="header-inner">
    <a href="../index.html">
      <img src="../images/late-records-logo.png" class="header-logo" alt="LATE RECORDS">
    </a>
    <a href="../cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a>
  </div>
</header>

<!-- MAIN -->
<div class="container" id="mainContainer"></div>

<!-- FOOTER -->
<footer class="fixed-footer">
  <div class="footer-inner">
    <span id="datetime-footer"></span>
    <div class="footer-links">
      <a href="https://instagram.com/late.records.ph" target="_blank" rel="noopener">
        Instagram<span class="external-arrow">↗</span>
      </a>
    </div>
  </div>
</footer>

<script src="../script.js"></script>
<script>

const ALBUM_ID  = new URLSearchParams(location.search).get('id') || '';
const AUDIO_BASE = '../audio/';

// ── Render helpers ───────────────────────────────────────────

function renderNotFound() {
  document.getElementById('mainContainer').innerHTML = `
    <div style="padding:80px 0;text-align:center;">
      <h2 style="font-size:24px;margin:0 0 12px;">Album not found</h2>
      <p style="color:#555;margin:0 0 24px;">We couldn't find that record.</p>
      <a href="../index.html" style="font-size:14px;text-decoration:underline;">← Back to shop</a>
    </div>
  `;
}

function scoreRelated(cur, cand) {
  let s = 0;
  const cg = LR.ui.splitPipe(cur.genre);
  const cc = LR.ui.splitPipe(cur.context);
  LR.ui.splitPipe(cand.genre).forEach(t    => { if (cg.includes(t)) s += 3; });
  LR.ui.splitPipe(cand.context).forEach(t  => { if (cc.includes(t)) s += 2; });
  return s;
}

function renderAlbum(item, all) {
  const sold   = item.status !== 'available';
  const tracks = LR.ui.splitPipe(item.tracklist);
  const related = all
    .filter(i => i.album_id !== item.album_id)
    .map(i => ({ i, s: scoreRelated(item, i) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 4);

  document.title = `${item.title} — LATE RECORDS`;

  document.getElementById('mainContainer').innerHTML = `
    <div class="album-page">

      <div class="album-image-wrap">
        <img
          src="../images/${item.album_id}.jpg"
          class="album-image"
          id="albumImg"
          alt="${item.title}"
        >
      </div>

      <div class="album-details">

        <div>
          <h1 class="album-title">${item.title}</h1>
          <p class="album-artist">by ${item.artist}</p>
        </div>

        <div>
          <p class="album-price" id="albumPrice">${sold ? '<span style="color:#aaa;text-decoration:line-through;">' + LR.ui.peso(item.price) + '</span>' : LR.ui.peso(item.price)}</p>
          <div class="button-row" style="margin-top:10px;">
            <button
              class="btn btn-solid"
              id="addToCartBtn"
              data-id="${item.album_id}"
              data-title="${item.title}"
              data-artist="${item.artist}"
              data-price="${item.price}"
              data-stock="${item.stock}"
              ${sold ? 'disabled' : ''}
            >${sold ? 'Sold Out' : 'Add to Cart'}</button>
            <span class="cart-confirm" id="cartConfirm">✓ Added</span>
          </div>
        </div>

        ${item.description ? `
        <div class="description-block">
          <p class="description" id="albumDesc">${item.description}</p>
          <button class="description-toggle" id="descToggle" style="display:none;">+ Read more</button>
        </div>` : ''}

        <div class="audio-block" id="audioBlock">
          <p class="block-heading">Audio</p>
          <div class="audio-shell">
            <div class="audio-top">
              <span class="audio-label" id="audioLabel">Sample 1</span>
              <div class="audio-nav">
                <button class="audio-arrow" id="audioPrev">‹</button>
                <button class="audio-arrow" id="audioNext">›</button>
              </div>
            </div>
            <audio id="albumAudio" controls preload="none"></audio>
          </div>
        </div>

        ${tracks.length ? `
        <div class="tracklist-block">
          <p class="block-heading">Tracklist</p>
          <ul class="tracklist">${tracks.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>` : ''}

      </div>
    </div>

    ${related.length ? `
    <section class="related-section">
      <h3 class="related-title">Recommended</h3>
      <div class="related-grid">
        ${related.map(({ i }) => `
          <a class="related-card" href="album.html?id=${i.album_id}">
            <img src="../images/${i.album_id}.jpg" class="related-cover" alt="${i.title}" loading="lazy">
            <div class="related-info">
              <p class="related-name">${i.title}</p>
              <p class="related-artist">${i.artist}</p>
            </div>
          </a>
        `).join('')}
      </div>
    </section>` : ''}
  `;

  setupDescToggle();
  setupAudio(item.album_id);
  setupAddToCart(item);
}

// ── Description toggle ───────────────────────────────────────

function setupDescToggle() {
  const desc   = document.getElementById('albumDesc');
  const toggle = document.getElementById('descToggle');
  if (!desc || !toggle) return;

  requestAnimationFrame(() => {
    if (desc.scrollHeight > 175) {
      desc.classList.add('is-collapsed');
      toggle.style.display = 'inline-block';
      toggle.textContent = '+ Read more';
    }
  });

  toggle.addEventListener('click', () => {
    const c = desc.classList.toggle('is-collapsed');
    toggle.textContent = c ? '+ Read more' : '− Read less';
  });
}

// ── Audio player ─────────────────────────────────────────────

function setupAudio(albumId) {
  const block  = document.getElementById('audioBlock');
  const audio  = document.getElementById('albumAudio');
  const label  = document.getElementById('audioLabel');
  const prev   = document.getElementById('audioPrev');
  const next   = document.getElementById('audioNext');
  if (!block || !audio) return;

  const valid = [];
  let cur = 0;

  function probe(i) {
    const url = `${AUDIO_BASE}${albumId}/${albumId}-sample-${i}.mp3`;
    const a   = new Audio();
    a.preload = 'metadata';
    a.addEventListener('loadedmetadata', () => { valid.push(url); probe(i + 1); }, { once: true });
    a.addEventListener('error', () => {
      if (valid.length) { block.classList.add('is-visible'); setTrack(0); }
    }, { once: true });
    a.src = url;
  }

  function setTrack(i) {
    cur = i;
    audio.src = valid[i];
    label.textContent = `Sample ${i + 1}`;
    prev.disabled = i === 0;
    next.disabled = i === valid.length - 1;
  }

  prev.addEventListener('click', () => { if (cur > 0) setTrack(cur - 1); });
  next.addEventListener('click', () => { if (cur < valid.length - 1) setTrack(cur + 1); });

  probe(1);
}

// ── Add to cart ───────────────────────────────────────────────

function setupAddToCart(item) {
  const btn     = document.getElementById('addToCartBtn');
  const confirm = document.getElementById('cartConfirm');
  if (!btn) return;

  btn.addEventListener('click', () => {
    const result = LR.cart.add({
      id:     item.album_id,
      title:  item.title,
      artist: item.artist,
      price:  item.price,
      stock:  item.stock
    });

    if (result === 'exists') {
      confirm.textContent = 'Already in cart';
    } else {
      confirm.textContent = '✓ Added';
    }

    confirm.classList.add('show');
    setTimeout(() => confirm.classList.remove('show'), 2000);
  });
}

// ── Init ──────────────────────────────────────────────────────

(async () => {
  if (!ALBUM_ID) { renderNotFound(); return; }

  try {
    const album = await LR.api.album(ALBUM_ID);
    if (!album) { renderNotFound(); return; }

    // Fetch full catalog for related section
    const all = await LR.api.catalog().catch(() => []);
    renderAlbum(album, all);

  } catch (e) {
    renderNotFound();
  }
})();

</script>
</body>
</html>

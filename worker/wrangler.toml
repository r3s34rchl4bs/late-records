name            = "late-records-api"
main            = "index.js"
compatibility_date = "2024-09-23"

# ── Routes ────────────────────────────────────────────────────────────────────
# Attach the Worker to your Pages domain under /api/*
# Set this up in the Cloudflare Dashboard:
#   Workers & Pages → your Pages project → Settings → Functions
# Or add a route manually:
#   Workers → Routes → late-records.shop/api/*

[[routes]]
pattern = "late-records.shop/api/*"
zone_name = "late-records.shop"

# ── Environment variables ─────────────────────────────────────────────────────
# APPS_SCRIPT_URL and TURNSTILE_SECRET must be set as secrets:
#   wrangler secret put APPS_SCRIPT_URL
#   wrangler secret put TURNSTILE_SECRET
#
# Never put secrets in this file.

# ── R2 Buckets ────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding  = "MEDIA"
bucket_name = "late-records-media"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# Refreshes catalog.json in R2 every 10 minutes so the R2 cache stays warm.
# Even if this misses, fetchCatalog() falls back to Apps Script automatically.
[triggers]
crons = ["*/10 * * * *"]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1
